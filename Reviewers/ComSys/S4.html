    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --correct-bg: #dcfce7;
            --correct-border: #22c55e;
            --correct-text: #166534;
            --incorrect-bg: #fee2e2;
            --incorrect-border: #ef4444;
            --incorrect-text: #991b1b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .reviewer-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--text);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .question-number {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .score-display {
            font-weight: 600;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background-color: var(--bg);
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            background-color: #e5e7eb;
        }

        .option.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option.incorrect {
            background-color: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            color: var(--incorrect-text);
            font-weight: 600;
        }

        .option.disabled {
            cursor: default;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid var(--bg);
            padding-top: 20px;
        }

        .nav-btn {
            padding: 10px 24px;
            font-size: 1rem;
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            cursor: pointer;
        }
    </style>
</head>

            <button onclick="shuffleQuestions()">Shuffle Questions</button>
            <label class="toggle-switch">

            <button onclick="resetQuiz()">Reset Reviewer</button>
        </div>

            { q: "There are points in the schedule against which you can assess progress.", options: ["Milestones", "Deliverables", "Quality plan"], correct: "Milestones" },
            { q: "In inter-organisational systems, not separate workflows are created for each organisation and linked through message exchange.", options: ["True", "False"], correct: "False" },
            { q: "The non-functional behavior of the service is unpredictable because it depends on load.", options: ["False", "True"], correct: "True" },
            { q: "The time required is not independent of the number of people working on the project.", options: ["False", "True"], correct: "True" },
            { q: "The logical specification is converted to a WSDL description", options: ["WSDL description", "Message design", "Logical interface design"], correct: "WSDL description" },
            { q: "Testing is intended to find defects and demonstrate that a system meets its functional and non-functional requirements.", options: ["True", "False"], correct: "True" },
            { q: "External services may be modified by the service provider thus invalidating tests which have been completed.", options: ["False", "True"], correct: "True" },
            { q: "Used once the system architecture has been designed and more information about the system is available.", options: ["Post-architecture model", "Early design model", "Reuse model"], correct: "Post-architecture model" },
            { q: "Estimates are made to discover the cost, to the developer, of producing a software system.", options: ["project startup", "Software Pricing", "Project Planning"], correct: "Software Pricing" },
            { q: "$ESLOC=ASLOC^{*}(1-AT/100)^{*}AAP.$", options: ["False", "True"], correct: "False" },
            { q: "Describes the configuration management procedures and structures to be used.", options: ["Configuration management plan", "Quality plan", "Validation plan"], correct: "Configuration management plan" },
            { q: "The development cost of usable components may be higher than the cost of specific equivalents.", options: ["True", "False"], correct: "False" },
            { q: "This avoids problems with scalability and performance if a thin-client two-tier model is chosen, or problems of system management if a fat-client model is used.", options: ["True", "False"], correct: "True" },
            { q: "The major problem with component validation is that the component specification may not be sufficiently detailed to allow you to develop a complete set of component tests.", options: ["False", "True"], correct: "True" },
            { q: "It is where the presentation layer is implemented on the client and all other layers (data management, application processing and database) are implemented on a server.", options: ["Failure management", "Thin-client model", "Fat-client model"], correct: "Thin-client model" },
            { q: "Graphical workflow notations, such as BPMN, are more readable and WS-BPEL can be generated from them.", options: ["False", "True"], correct: "True" },
            { q: "$PM=(ASLOC^{*}AT/100)/ATPROD.$", options: ["False", "True"], correct: "True" },
            { q: "ASLOC is the number of lines of generated code.", options: ["True", "False"], correct: "True" },
            { q: "In 1996, the 1st test flight of the Ariane 5 rocket ended in disaster when the launcher went out of control 37 seconds after take off.", options: ["True", "False"], correct: "True" },
            { q: "Access control, where service customers create individual accounts for their staff and define the resources and functions that are not accessible to each of their users.", options: ["True", "False"], correct: "False" },
            { q: "Personnel attributes Multipliers that take the experience and capabilities of the people working on the project into account.", options: ["False", "True"], correct: "True" },
            { q: "ET is the percentage of code automatically generated.", options: ["True", "False"], correct: "False" },
            { q: "ETPROD is the productivity of engineers in integrating this code.", options: ["False", "True"], correct: "False" },
            { q: "In this approach, a formulaic approach is used to compute the project effort based on estimates of product attributes, such as size, and process characteristics, such as experience of staff involved.", options: ["Story-based planning", "Experience-based techniques", "Algorithmic cost modeling"], correct: "Algorithmic cost modeling" },
            { q: "Do not estimate of equivalent number of lines of new code computed using the reuse model.", options: ["False", "True"], correct: "False" },
            { q: "Service testing is difficult as (external) services are 'black-boxes'.", options: ["True", "False"], correct: "True" },
            { q: "Branding, where users from each organization, are presented with an interface that reflects their own organization.", options: ["True", "False"], correct: "True" },
            { q: "This services may be entity- or task- oriented, coordination services are always task-oriented.", options: ["Utility or business Services", "Entity-oriented Services", "Task-oriented Services"], correct: "Utility or business Services" },
            { q: "Estimate of equivalent number of lines of new code computed using the reuse model.", options: ["True", "False"], correct: "True" },
            { q: "Used when requirements are available but design has not yet started", options: ["Application composition model", "Reuse model", "Early design model"], correct: "Early design model" }
        ];

        let questions = JSON.parse(JSON.stringify(originalQuestionsData));
        let currentIndex = 0;
        let score = 0;
        let answeredState = new Array(questions.length).fill(false);

        // Utility to shuffle an array (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadQuestion() {
            const currentQ = questions[currentIndex];
            const isAnswered = answeredState[currentIndex];
            
            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = currentQ.q;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            // Apply choice shuffling if enabled and not yet answered
            let displayOptions = [...currentQ.options];
            if (!isAnswered && document.getElementById('shuffleOptionsToggle').checked) {
                shuffleArray(displayOptions);
            } else if (isAnswered) {
                // If already answered, keep the order we rendered it in originally
                displayOptions = currentQ.displayedOptions || [...currentQ.options];
            }
            
            // Store the displayed order so it persists when navigating back
            currentQ.displayedOptions = displayOptions;

            displayOptions.forEach(optionText => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.textContent = optionText;
                
                if (isAnswered) {
                    optDiv.classList.add('disabled');
                    if (optionText === currentQ.correct) {
                        optDiv.classList.add('correct');
                    } else if (optionText === currentQ.userAnswer && currentQ.userAnswer !== currentQ.correct) {
                        optDiv.classList.add('incorrect');
                    }
                } else {
                    optDiv.onclick = () => handleAnswer(optDiv, optionText);
                }
                
                optionsContainer.appendChild(optDiv);
            });
        }

        function handleAnswer(element, selectedAnswer) {
            if (answeredState[currentIndex]) return;
            
            const currentQ = questions[currentIndex];
            currentQ.userAnswer = selectedAnswer;
            answeredState[currentIndex] = true;

            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.add('disabled'));

            if (selectedAnswer === currentQ.correct) {
                element.classList.add('correct');
                score++;
                document.getElementById('scoreDisplay').textContent = score;
            } else {
                element.classList.add('incorrect');
                // Highlight the correct one
                allOptions.forEach(opt => {
                    if (opt.textContent === currentQ.correct) {
                        opt.classList.add('correct');
                    }
                });
            }
        }

        function navigate(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= questions.length) currentIndex = questions.length - 1;
            loadQuestion();
        }

        function jumpToQuestion() {
            const input = document.getElementById('jumpInput');
            const val = parseInt(input.value);
            if (!isNaN(val) && val >= 1 && val <= questions.length) {
                currentIndex = val - 1;
                loadQuestion();
                input.value = '';
            } else {
                alert(`Please enter a valid number between 1 and ${questions.length}`);
            }
        }

        function shuffleQuestions() {
            if(confirm("This will restart the reviewer and wipe your current score. Continue?")) {
                shuffleArray(questions);
                resetStates();
            }
        }

        function resetQuiz() {
            if(confirm("This will reset the quiz back to the original order. Continue?")) {
                questions = JSON.parse(JSON.stringify(originalQuestionsData));
                resetStates();
            }
        }

        function resetStates() {
            currentIndex = 0;
            score = 0;
            answeredState = new Array(questions.length).fill(false);
            document.getElementById('scoreDisplay').textContent = score;
            loadQuestion();
        }

        // Allow pressing Enter in the jump input
        document.getElementById('jumpInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') jumpToQuestion();
        });

        // Initial Load
        loadQuestion();
    </script>
