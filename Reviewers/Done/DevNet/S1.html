<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summative 1 Quiz Reviewer</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --correct-bg: #dcfce7;
            --correct-border: #22c55e;
            --correct-text: #166534;
            --incorrect-bg: #fee2e2;
            --incorrect-border: #ef4444;
            --incorrect-text: #991b1b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .reviewer-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--text);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .question-number {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .score-display {
            font-weight: 600;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background-color: var(--bg);
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            background-color: #e5e7eb;
        }

        .option.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option.incorrect {
            background-color: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            color: var(--incorrect-text);
            font-weight: 600;
        }

        .option.disabled {
            cursor: default;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid var(--bg);
            padding-top: 20px;
        }

        .nav-btn {
            padding: 10px 24px;
            font-size: 1rem;
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="reviewer-container">
        <h1>Seatwork Quiz Reviewer</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="jumpInput">Jump to:</label>
                <input type="number" id="jumpInput" min="1" max="49" placeholder="1-49">
                <button onclick="jumpToQuestion()">Go</button>
            </div>
            <button onclick="shuffleQuestions()">Shuffle Questions</button>
            <label class="toggle-switch">
                <input type="checkbox" id="shuffleOptionsToggle" checked>
                Shuffle Choices Automatically
            </label>
            <button onclick="resetQuiz()">Reset Reviewer</button>
        </div>

        <div class="question-header">
            <div class="question-number" id="questionCounter">Question 1 of 49</div>
            <div class="score-display">Score: <span id="scoreDisplay">0</span></div>
        </div>

        <div class="question-text" id="questionText">Loading...</div>
        
        <div class="options-container" id="optionsContainer">
            </div>

        <div class="navigation">
            <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next</button>
        </div>
    </div>

    <script>
        const originalQuestionsData = [
            { q: "A system administrator issues the apt-get upgrade command on a Linux operating system. What is the purpose of this command?", options: ["Operating system updates are downloaded and will be installed.", "The remote repository of applications and dependencies will be updated to the latest version.", "Every application installed will update itself to the latest version.", "A specific application named upgrade will be installed."], correct: "Every application installed will update itself to the latest version." },
            { q: "What is the output when the following code is entered into a Python program interpreter? [1,2,4,5]+[3,6]", options: ["[12]+[9]", "[21]", "[1,2,4,5,3,6]", "[1,2,3,4,5,6]"], correct: "[1,2,4,5,3,6]" },
            { q: "A network engineer needs to review the status of all network interfaces of a server running a Linux operating system. The engineer enters the command ifconfig -a. What is the result of this command?", options: ["The ARP table of the computer will be displayed.", "Both active and inactive interfaces will display information.", "All active interfaces will display information.", "The host routing table will be displayed."], correct: "Both active and inactive interfaces will display information." },
            { q: "Which Python command creates a conditional control structure?", options: ["from", "def", "if", "delay"], correct: "if" },
            { q: "A user enters the commands as shown. What is the result after the mv command is entered?\ndevasc@labvm:~/Documents$ pwd\n/home/devasc/Documents\ndevasc@labvm:~/Documents$ mv myfile.sh ../Desktop/myfile2.sh", options: ["The file myfile.sh is copied and renamed to myfile2.sh in the current directory.", "The file myfile.sh is copied to the /home/devasc/Desktop directory and replaces the file myfile2.sh.", "The file myfile.sh is copied to the /home/devasc/Desktop directory and renamed as myfile2.sh.", "The file myfile.sh is moved to the /home/devasc/Desktop directory and renamed as myfile2.sh."], correct: "The file myfile.sh is moved to the /home/devasc/Desktop directory and renamed as myfile2.sh." },
            { q: "A student new to Python is working in the interactive interpreter mode. The student issues the commands:\n>>> ipAddress = {\"R1\":\"10.1.1.1\", \"R2\":\"10.2.2.1\"}\nWhich data type is used to represent the variable?", options: ["dictionary", "tuple", "array", "list"], correct: "dictionary" },
            { q: "A user issues a Linux command and the result is shown:\ntotal 40\ndrwxr-xr-x 2 devasc devasc 4096 Mar 30 21:25 Des\n...\nWhich Linux command is used to display the contents of the current directory as shown?", options: ["ls -l", "ls -a", "ls -lr", "ls"], correct: "ls -l" },
            { q: "A user issues a Linux command and the result is shown.\ntotal 40\ndrwxr-xr-x 2 devasc devasc 4096 Apr 15 19:09 Vid\ndrwxr-xr-x 2 devasc devasc 4096 Apr 15 19:09 Terr\n...\nWhich Linux command is used to display the contents of the current directory as shown?", options: ["ls -lr", "ls-", "ln", "ls -a"], correct: "ls -lr" },
            { q: "A system administrator of a Linux server is searching the passwd file for the username taylor that appears at the beginning of the line. Which grep command should the administrator use?", options: ["grep '[taylor]' /etc/passwd", "grep '^taylor' /etc/passwd", "grep '.taylor' /etc/passwd", "grep taylor /etc/passwd"], correct: "grep '^taylor' /etc/passwd" },
            { q: "Which Python programming function is used to display output?", options: ["while", "print", "if", "for"], correct: "print" },
            { q: "A system administrator attempts to determine what is causing a computer to perform slower than normal. The administrator issues the ps command. What is displayed by this command?", options: ["active processes using CPU time", "current NIC status", "current HDD usage", "current RAM usage"], correct: "active processes using CPU time" },
            { q: "A student is learning Python using the interactive interpreter mode. The student issues the commands:\n>>> routers=[]\n>>> switches=[]\n>>> devices=[\"RT1\", \"RT2\", \"RT3\", \"SW1\", \"SW2\"]\n>>> devices=devices + [\"RT4\", \"SW4\"]\n>>> for i in devices:\nif \"R\" in i:\nrouters.append(i)\nelse: switches.append(i)\n>>> switches\nWhat is the result?", options: ["['SW4', 'SW1', 'SW2', 'SW3']", "['SW1', 'SW2', 'SW3', 'SW4']", "['SW4']", "['SW4', 'SW3', 'SW2', 'SW1']", "['SW1', 'SW2', 'SW3']"], correct: "['SW1', 'SW2', 'SW3', 'SW4']" },
            { q: "A student is learning Python in the interactive interpreter mode. The student issues the commands:\n>>> devicenames=[\"RT1\", \"RT2\", \"SW1\", \"SW2\"]\n>>> devicenames[-1]\nWhat is the result?", options: ["SW1", "RT1", "an error message", "['RT2', 'SW1', 'SW2']", "SW2"], correct: "SW2" },
            { q: "A Linux administrator is attempting to use a terminal to configure the network interface card on a computer. The administrator receives a message that the administrator does not have necessary permissions to perform the configuration. What should be done prior to the configuration command?", options: ["use a different user account", "change the chmod permissions on the network configuration file", "use the sudo command", "identify a different network interface"], correct: "use the sudo command" },
            { q: "A user issues the Linux command ls -l myfile.sh to check the permission of the file myfile.sh.\ndevasc@labvm:~/Documents$ ls -l myfile.sh\n-rwxr-xr-- 1 self test 15 Mar 30 21:24 myfile.sh\nWhich two statements describe the permissions assigned to the file? (Choose two.)", options: ["The user with the user ID of devasc can modify the file.", "All users can execute the file.", "The user with the user ID of self can modify the file.", "Any user in the self group can read, modify, and execute the file.", "Any user in the test group can execute the file."], correct: ["The user with the user ID of self can modify the file.", "Any user in the test group can execute the file."] },
            { q: "A network engineer needs to review the status of all network interfaces of a server running a Linux operating system. The engineer enters the command ifconfig -a. What is the result of this command?", options: ["The host routing table will be displayed.", "The ARP table of the computer will be displayed.", "Both active and inactive interfaces will display information.", "All active interfaces will display information."], correct: "Both active and inactive interfaces will display information." },
            { q: "What command is used to rename a file in a Linux system?", options: ["cp", "mv", "rm", "dd"], correct: "mv" },
            { q: "A user issues the apt-get upgrade command to update system files in a Ubuntu Linux system and receives an error message of \"permission denied.\" What should the user do to complete the task?", options: ["Issue the sudo apt-get upgrade command.", "Issue the apt-get install -allow command.", "Issue the sudo apt-get install command.", "Issue the allow apt-get upgrade command."], correct: "Issue the sudo apt-get upgrade command." },
            { q: "A developer needs to check the version of the running Python package. Which command should the developer use?", options: ["python3 -v", "python3 -V", "python3 -i", "python3 -q"], correct: "python3 -V" },
            { q: "What is displayed after the following code is entered into a Python interpreter?\naddition = 22 + 10\nprint(addition)", options: ["32", "nothing (because the print command is wrong)", "(syntaxerror)-...as there should not be a space between the numerical values", "[22]+[10]"], correct: "32" },
            { q: "A student is learning Python in the interactive interpreter mode. The student issues the commands:\n>>> y=2\n>>> y*3\n6\n>>> 'Test'*y\nWhat is the result?", options: ["TypeError: A string type cannot be multiplied by an integer.", "'Test6'", "'Test2'", "'TestTest'", "'TestTestTestTestTestTest'"], correct: "'TestTest'" },
            { q: "A student is learning Python in the interactive interpreter mode. The student issues the command:\n>>> type(True)\nWhat is the data type reported by Python?", options: ["integer", "float", "Boolean", "string"], correct: "Boolean" },
            { q: "A Linux system administrator is searching the passwd file for any username that starts with a digit. Which grep command should the administrator use?", options: ["grep '(0-9' /etc/passwd", "grep '_[0-9]'/etc/passwd", "grep '[0-9]' /etc/passwd", "grep '^[0-9]' /etc/passwd"], correct: "grep '^[0-9]' /etc/passwd" },
            { q: "A student new to Python is working in the interactive interpreter mode. The student issues the commands:\n>>> devicenames=[\"RT1\", \"RT2\", \"SW1\", \"SW2\"]\n>>> hostnames=devicenames + [\"RT3\", \"SW3\"]\n>>> del hostnames[3]\n>>> hostnames\nWhat is the result?", options: ["['RT1', 'RT2', 'SW1', 'RT3', 'SW3']", "['RT1', 'RT2', 'SW1', 'SW2', 'SW3']", "['RT1', 'RT2', 'SW2', 'RT3', 'SW3']", "['RT1', 'RT2', 'RT3', 'SW2', 'SW3']"], correct: "['RT1', 'RT2', 'SW1', 'RT3', 'SW3']" },
            { q: "What Linux command is used to display the contents of the current directory?", options: ["pwd", "cat", "ls", "ln"], correct: "ls" },
            { q: "A user issues a series of Linux commands as shown.\n(omitted)$ pwd\n/home/devasc/labs/ansible/backups\n(omitted)$ cd ../..\nWhich directory is the current directory after the cd command is entered?", options: ["/home/devasc/labs", "/home/devasc/labs/ansible", "/home", "/home/devasc/"], correct: "/home/devasc/labs" },
            { q: "A student new to Python is working in the interactive interpreter mode. The student issues the command:\n>>> ipAddress = {\"R1\":\"10.1.1.1\", \"R2\":\"10.2.2.1\"}\nWhich Python expression can be used to retrieve the IP address of R2?", options: ["ipAddress{\"R2\"}", "ipAddress['R2']", "ipAddress[R2]", "ipAddress{'R2'}"], correct: "ipAddress['R2']" },
            { q: "What is network programmability?", options: ["the ability to configure, monitor, and react to events in the network in real time", "the ability to program network devices using repettive manual configuration via a terminal and command sets", "the ability to configure virtualized networks and deploy virtualized services in real time", "the ability to easily monitor network devices using traditional network protocols"], correct: "the ability to configure, monitor, and react to events in the network in real time" },
            { q: "What is the purpose of Cisco DevNet?", options: ["to teach everyone about the different Cisco API offerings and how to use them", "to be the central resource for everything about networking at Cisco", "to teach specific coding courses such as advanced Python and implementing REST APIs", "to be the central resource for advanced software developers and the use of Cisco APIs"], correct: "to teach everyone about the different Cisco API offerings and how to use them" },
            { q: "Which Cisco DevNet developer support option provides 1-on-1 support to the members of the Solution Partner program?", options: ["case-based ticket", "knowledge base", "community forum", "chat with DevNet"], correct: "case-based ticket" },
            { q: "Which link is used from the Cisco DevNet Learning Labs to access the largest collections of labs?", options: ["Sections", "Tracks", "Bookends", "Modules"], correct: "Tracks" },
            { q: "Which Cisco DevNet online resource provides use cases for network automation, including listing data and activating policies across domains?", options: ["DevNet Learning Labs", "Code Exchange", "Automation Exchange", "DevNet Sandbox"], correct: "Automation Exchange" },
            { q: "What are two requirements when participating in the DevNet Learning Labs? (Choose two.)", options: ["The user must successfully log in with a DevNet account.", "The user must have an active internet connection.", "The user must have successfully passed the 200-901 DEVASC exam.", "The user must have purchased the DevNet Learning Labs activation license.", "The user must install a developer environment on a local computer."], correct: ["The user must successfully log in with a DevNet account.", "The user must have an active internet connection."] },
            { q: "What are three major areas that comprise DevNet? (Choose three.)", options: ["providing support for website creation and maintenance", "automation and programmability standards development area", "interactive and collaborative developer community", "on-line training site for various technology vendors", "integrated community forums", "coordinated developer tools"], correct: ["interactive and collaborative developer community", "integrated community forums", "coordinated developer tools"] },
            { q: "What is required in order to ensure that clients are able to talk to applications that are outside a local system?", options: ["a script", "a network", "an application", "an API"], correct: "a network" },
            { q: "What is the purpose of the Cisco DevNet Learning Labs?", options: ["They provide a space for game development, interaction, and learning based on coding.", "They allow participants to add their own Python labs.", "They allow participants to add their own labs as long as the labs relate to any type of coding.", "They provide self-paced tutorials including coding."], correct: "They provide self-paced tutorials including coding." },
            { q: "Which DevNet event is provided by Cisco partners and Cisco offices?", options: ["DevNet Express", "DevNet Hackathon", "DevNet Learn In", "DevNet Codearama"], correct: "DevNet Express" },
            { q: "What are two benefits of using APIs and integrations between applications? (Choose two.)", options: ["Integrations enable the applications to request actions from each other.", "Integrations are used to verify compatibility between different applications.", "Integrations enable the applications to be installed on any operating system type.", "Integrations are used to provide applications the ability to notify each other when a specific event happens.", "Integrations enable the applications to run a Docker instance using Hyper-V."], correct: ["Integrations enable the applications to request actions from each other.", "Integrations are used to provide applications the ability to notify each other when a specific event happens."] },
            { q: "What type of learner should take the DevNet Associate course?", options: ["only new software developers", "only new network engineers", "anyone interested in network automation and programmability", "anyone that does not like working in teams and is a software developer"], correct: "anyone interested in network automation and programmability" },
            { q: "What is contained within a DevNet Sandbox?", options: ["a collection of Cisco developer API documentation", "a preconfigured environment already installed with Cisco platforms", "instructor-led videos focusing on hands-on exercises", "a collection of self-paced tutorials using REST APIs"], correct: "a preconfigured environment already installed with Cisco platforms" },
            { q: "Which two DevNet resources are available online? (Choose two.)", options: ["Code Exchange", "API Tokens", "Python Exchange", "Automation Exchange", "DevNet Zone"], correct: ["Code Exchange", "Automation Exchange"] },
            { q: "Which website provides the entry point for Cisco DevNet?", options: ["developer.cisco.com", "devnet.com", "cisco.com", "talosintelligence.com"], correct: "developer.cisco.com" },
            { q: "Which technology trend enables an industry shift towards automation, applications, and integrations?", options: ["increased storage and RAM", "increased intenet connection bandwidth", "smaller and faster CPUs", "advanced API capabilities"], correct: "advanced API capabilities" },
            { q: "What resources are available in the Cisco DevNet sandboxes?", options: ["production-like development and code testing environments", "support for developer-related issues through the use of forums and live chats", "a repository of sample code writen by developers", "self-paced tutorials that cover a wide range of automation and integration topics"], correct: "production-like development and code testing environments" },
            { q: "Which DevNet resource would a developer use if the developer is using a Cisco API and needs help understanding the error message received?", options: ["DevNet Learning Labs", "Code Exchange", "DevNet Support", "DevNet Sandbox"], correct: "DevNet Support" },
            { q: "What is Cisco DevNet?", options: ["a developer program", "a way to create networks using software alone", "a Cisco-proprietary virtual network", "a vendor-neutral type of virtual networking"], correct: "a developer program" },
            { q: "What is the contracted response time after a developer opens a case-based ticket with the DevNet support service?", options: ["one business day", "one hour", "one week", "five business days"], correct: "one business day" },
            { q: "What is a requirement when creating a Cisco DevNet account for accessing educational resources, such as Learning Labs and the DevNet Sandbox?", options: ["The account holder must share personally created code before access is allowed.", "The account must contain a purchased license.", "The account must be registered using a Cisco email address.", "The account must be created using an existing online identity or via a new Cisco account."], correct: "The account must be created using an existing online identity or via a new Cisco account." },
            { q: "What resources are available in the Cisco DevNet Code Exchange?", options: ["a repository of sample code written by other developers", "support for developer-related issues using forums and live chats", "production-like development and code testing environments", "self-paced tutorials that cover a wide range of automation and integration topics"], correct: "a repository of sample code written by other developers" }
        ];
    
        let questions = JSON.parse(JSON.stringify(originalQuestionsData));
        let currentIndex = 0;
        let score = 0;
        let answeredState = new Array(questions.length).fill(false);

        // Utility to shuffle an array (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadQuestion() {
            const currentQ = questions[currentIndex];
            const isAnswered = answeredState[currentIndex];
            
            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = currentQ.q;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            // Apply choice shuffling if enabled and not yet answered
            let displayOptions = [...currentQ.options];
            if (!isAnswered && document.getElementById('shuffleOptionsToggle').checked) {
                shuffleArray(displayOptions);
            } else if (isAnswered) {
                // If already answered, keep the order we rendered it in originally
                displayOptions = currentQ.displayedOptions || [...currentQ.options];
            }
            
            // Store the displayed order so it persists when navigating back
            currentQ.displayedOptions = displayOptions;

            displayOptions.forEach(optionText => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.textContent = optionText;
                
                if (isAnswered) {
                    optDiv.classList.add('disabled');
                    if (optionText === currentQ.correct) {
                        optDiv.classList.add('correct');
                    } else if (optionText === currentQ.userAnswer && currentQ.userAnswer !== currentQ.correct) {
                        optDiv.classList.add('incorrect');
                    }
                } else {
                    optDiv.onclick = () => handleAnswer(optDiv, optionText);
                }
                
                optionsContainer.appendChild(optDiv);
            });
        }

        function handleAnswer(element, selectedAnswer) {
            if (answeredState[currentIndex]) return;
            
            const currentQ = questions[currentIndex];
            currentQ.userAnswer = selectedAnswer;
            answeredState[currentIndex] = true;

            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.add('disabled'));

            if (selectedAnswer === currentQ.correct) {
                element.classList.add('correct');
                score++;
                document.getElementById('scoreDisplay').textContent = score;
            } else {
                element.classList.add('incorrect');
                // Highlight the correct one
                allOptions.forEach(opt => {
                    if (opt.textContent === currentQ.correct) {
                        opt.classList.add('correct');
                    }
                });
            }
        }

        function navigate(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= questions.length) currentIndex = questions.length - 1;
            loadQuestion();
        }

        function jumpToQuestion() {
            const input = document.getElementById('jumpInput');
            const val = parseInt(input.value);
            if (!isNaN(val) && val >= 1 && val <= questions.length) {
                currentIndex = val - 1;
                loadQuestion();
                input.value = '';
            } else {
                alert(`Please enter a valid number between 1 and ${questions.length}`);
            }
        }

        function shuffleQuestions() {
            if(confirm("This will restart the reviewer and wipe your current score. Continue?")) {
                shuffleArray(questions);
                resetStates();
            }
        }

        function resetQuiz() {
            if(confirm("This will reset the quiz back to the original order. Continue?")) {
                questions = JSON.parse(JSON.stringify(originalQuestionsData));
                resetStates();
            }
        }

        function resetStates() {
            currentIndex = 0;
            score = 0;
            answeredState = new Array(questions.length).fill(false);
            document.getElementById('scoreDisplay').textContent = score;
            loadQuestion();
        }

        // Allow pressing Enter in the jump input
        document.getElementById('jumpInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') jumpToQuestion();
        });

        // Initial Load
        loadQuestion();
    </script>
</body>
</html>
