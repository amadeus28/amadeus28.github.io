<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCI & Research Methods Reviewer</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --correct-bg: #dcfce7;
            --correct-border: #22c55e;
            --correct-text: #166534;
            --incorrect-bg: #fee2e2;
            --incorrect-border: #ef4444;
            --incorrect-text: #991b1b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .reviewer-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--text);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .question-number {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .score-display {
            font-weight: 600;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-wrap;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background-color: var(--bg);
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            background-color: #e5e7eb;
        }

        .option.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option.incorrect {
            background-color: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            color: var(--incorrect-text);
            font-weight: 600;
        }

        .option.disabled {
            cursor: default;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid var(--bg);
            padding-top: 20px;
        }

        .nav-btn {
            padding: 10px 24px;
            font-size: 1rem;
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="reviewer-container">
        <h1>HCI Research Methods (F3-4) Reviewer</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="jumpInput">Jump to:</label>
                <input type="number" id="jumpInput" min="1" max="99" placeholder="1-99">
                <button onclick="jumpToQuestion()">Go</button>
            </div>
            <button onclick="shuffleQuestions()">Shuffle Questions</button>
            <label class="toggle-switch">
                <input type="checkbox" id="shuffleOptionsToggle" checked>
                Shuffle Choices Automatically
            </label>
            <button onclick="resetQuiz()">Reset Reviewer</button>
        </div>

        <div class="question-header">
            <div class="question-number" id="questionCounter">Question 1 of 99</div>
            <div class="score-display">Score: <span id="scoreDisplay">0</span></div>
        </div>

        <div class="question-text" id="questionText">Loading...</div>
        
        <div class="options-container" id="optionsContainer">
            </div>

        <div class="navigation">
            <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next</button>
        </div>
    </div>

    <script>
        const originalQuestionsData = [
            { q: "Which tool allows remote screen sharing and integrated audio for usability studies?", options: ["Google Docs", "Online forums", "Email", "Web conferencing tools"], correct: "Web conferencing tools" },

            { q: "You want to test if device preference differs by age group. What kind of table do you create first?", options: ["Contingency table", "Histogram", "Line graph", "Scatter plot"], correct: "Contingency table" },
            { q: "What is a major concern with using convenience samples in HCI research?", options: ["Cost", "Time", "Validity and generalizability", "Technology limitations"], correct: "Validity and generalizability" },
            { q: "Which of the following is NOT a method of online data collection?", options: ["Face-to-face interviews", "Instrumented software", "Web log analysis", "Online surveys"], correct: "Face-to-face interviews" },
            { q: "What does CAPTCHA stand for?", options: ["Completely Automated Public Turing test to tell Computers and Humans Apart", "Captured Human Algorithm", "Computerized Authentication Process", "Computer Access Protocol"], correct: "Completely Automated Public Turing test to tell Computers and Humans Apart" },
            { q: "What was the goal of reCAPTCHA?", options: ["Digitize difficult text for OCR", "Track user behavior", "Prevent spam", "Encrypt passwords"], correct: "Digitize difficult text for OCR" },
            { q: "Which platform is popular for DIY sensor projects?", options: ["Excel", "Photoshop", "Slack", "Arduino"], correct: "Arduino" },
            { q: "You are designing a mobile app and want to know how many users prefer dark mode. What method should you use?", options: ["Interview", "Observation", "Survey", "Case Study"], correct: "Survey" },
            { q: "A company wants to test a new feature with a group that represents their entire user base. What sampling method should they use?", options: ["Convenience sampling", "Simple random sampling", "Judgement sampling", "Snowball sampling"], correct: "Simple random sampling" },

            { q: "You want to compare user satisfaction between two different app versions. What method is best?", options: ["Focus group", "Case study", "Observation", "Survey"], correct: "Survey" },
            { q: "What is \"A/B testing\" used for?", options: ["Measuring bandwidth", "Comparing alternative website designs", "Comparing user demographics", "Testing hardware"], correct: "Comparing alternative website designs" },
            { q: "Which type of study is easiest to conduct online?", options: ["Sensor calibration", "Mobile app testing", "Hardware usability", "Ethnographic studies of support groups"], correct: "Ethnographic studies of support groups" },
            { q: "What is a drawback of crowdsourced studies?", options: ["Limited participant pool", "Lack of direct observation", "High cost", "Complex infrastructure"], correct: "Lack of direct observation" },
            { q: "What is the flagship conference for ubiquitous computing?", options: ["WWW", "ICML", "UbiComp", "SIGCHI"], correct: "UbiComp" },
            { q: "A researcher wants to understand why users abandon a checkout process. Which method is most appropriate?", options: ["Observation", "Interview", "Questionnaire", "Sampling"], correct: "Interview" },
            { q: "You want to gather data from 10,000 users quickly and cheaply. What should you use?", options: ["Focus group", "Passive observation", "Web-based questionnaire", "Case study"], correct: "Web-based questionnaire" },
            { q: "A UX designer wants to observe how users interact with a kiosk without influencing them. Which method is best?", options: ["Total participation", "Active participation", "Passive participation", "Structured interview"], correct: "Passive participation" },
            { q: "You want to know how many users prefer iOS over Android. What type of question should you ask?", options: ["Open-ended", "Likert scale", "Unordered closed-ended", "Ordered closed-ended"], correct: "Unordered closed-ended" },
            { q: "What is a major challenge in sensor-based HCI research?", options: ["Software licensing", "Survey design", "Recruiting participants", "Data transfer and processing"], correct: "Data transfer and processing" },
            { q: "A researcher sends out a paper questionnaire but gets few responses. What is a likely drawback?", options: ["Inaccurate questions", "Biased data", "High cost", "Low response rate"], correct: "Low response rate" },
            { q: "You want to explore user behavior in a natural setting without interfering. What method should you use?", options: ["Survey", "Focus group", "Interview", "Passive observation"], correct: "Passive observation" },
            { q: "A team wants to test a new feature with users who are easy to reach. What sampling method are they using?", options: ["Cluster", "Stratified", "Convenience", "Systematic"], correct: "Convenience" },
            { q: "A researcher wants to explore how users interact with a new interface in real time. What method is best?", options: ["Survey", "Interview", "Observation", "Case study"], correct: "Observation" },
            { q: "You want to know how users feel about a feature immediately after using it. What method avoids recall bias?", options: ["Interview after one month", "Survey after one week", "Observation during use", "Focus group"], correct: "Observation during use" },
            { q: "A researcher wants to study a group of users over time to see how their behavior changes. What method is best?", options: ["Case study", "Interview", "Observation", "Survey"], correct: "Case study" },
            { q: "A user is asked to choose their favorite app from a list. What type of question is this?", options: ["Open-ended", "Unordered closed-ended", "Likert scale", "Ordered closed-ended"], correct: "Unordered closed-ended" },
            { q: "You want to know how many users clicked a button last week. What kind of data is this?", options: ["Subjective", "Quantitative", "Observational", "Qualitative"], correct: "Quantitative" },
            { q: "A researcher wants to understand cultural differences in app usage. What method is most appropriate?", options: ["Likert scale", "Survey", "Interview", "Random sampling"], correct: "Interview" },
            { q: "You want to explore how users feel about a new feature. Which question type is best?", options: ["Open-ended", "Closed-ended", "Multiple choice", "Likert scale"], correct: "Open-ended" },
            { q: "Which type of research is best for studying changes over time?", options: ["Cross-sectional", "Longitudinal", "Correlational", "Descriptive"], correct: "Longitudinal" },
            { q: "Which type of HCI contribution involves creating new tools or systems?", options: ["Methodological", "Theoretical", "Artifact", "Survey"], correct: "Artifact" },
            { q: "What is the focus of phenomenological research?", options: ["Statistical relationships", "Cultural practices", "Common lived experiences", "Market trends"], correct: "Common lived experiences" },
            { q: "What is the purpose of a survey contribution in HCI?", options: ["To test a new interface", "To collect user feedback", "To observe user behavior", "To synthesize existing research"], correct: "To synthesize existing research" },
            { q: "A researcher wants to compare the average task completion time between users who used a mouse and those who used a touchscreen. What test should be used?", options: ["Independent-samples t-test", "Chi-square test", "Correlation test", "Paired-samples t-test"], correct: "Independent-samples t-test" },
            { q: "In a usability study, a participant's age is recorded as 222. What should be done first?", options: ["Code the data", "Calculate variance", "Run analysis", "Clean the data"], correct: "Clean the data" },
            { q: "A student wants to summarize how often each device was preferred. What should they create?", options: ["Scatter plot", "Histogram", "Box plot", "Frequency distribution"], correct: "Frequency distribution" },
            { q: "You want to find the average satisfaction score from a survey. What measure do you use?", options: ["Median", "Range", "Mode", "Mean"], correct: "Mean" },
            { q: "You want to compare the popularity of four ads among men and women. What type of data is this?", options: ["Multivariate", "Univariate", "Bivariate", "Qualitative"], correct: "Bivariate" },
            { q: "You want to know the difference between the highest and lowest satisfaction scores. What do you calculate?", options: ["Median", "Range", "Mode", "Mean"], correct: "Range" },
            { q: "A researcher finds r = 0.325 between two task times. What does this mean?", options: ["Perfect correlation", "Strong correlation", "No significant correlation", "Negative correlation"], correct: "No significant correlation" },
            { q: "A student finds the variance of task times is 21704. What is the standard deviation?", options: ["21704", "394", "76", "147"], correct: "147" },
            { q: "What is the goal of correlational research?", options: ["To test a new product", "To determine causality", "To measure relationships between variables", "To describe a phenomenon"], correct: "To measure relationships between variables" },

            { q: "You want to analyze how three age groups prefer three different devices. What is the degree of freedom for the chi-square test?", options: ["4", "6", "2", "9"], correct: "4" },

            { q: "Which of the following is a theoretical contribution in HCI?", options: ["A predictive model like Fitts's Law", "A usability test", "A new dataset", "A new interface design"], correct: "A predictive model like Fitts's Law" },
            { q: "You collected data on age, gender, and device preference. What type of data analysis is appropriate?", options: ["Univariate", "Multivariate", "Bivariate", "Qualitative"], correct: "Multivariate" },
            { q: "A student wants to know if there's a relationship between time spent on a task and years of computer experience. What test should they use?", options: ["Pearson correlation", "Mode", "Chi-square", "T-test"], correct: "Pearson correlation" },
            { q: "You want to find the midpoint of a class interval 10-12. What is it?", options: ["12", "11", "10", "13"], correct: "11" },
            { q: "A researcher uses SPSS to run a t-test. How should the data be arranged for independent samples?", options: ["Frequency table", "Separate columns", "Same row", "Same column with group coding"], correct: "Same column with group coding" },
            { q: "You're analyzing data with three variables: age, device type, and satisfaction score. What analysis applies?", options: ["Bivariate", "Univariate", "Multivariate", "Descriptive"], correct: "Multivariate" },
            { q: "A student codes gender as Male = 1, Female = 0. What is this process called?", options: ["Cleaning", "Coding", "Tabulation", "Organizing"], correct: "Coding" },
            { q: "A researcher finds that as experience increases, task time decreases. What does a negative Pearson's r indicate?", options: ["No relationship", "Positive correlation", "Negative correlation", "Error in data"], correct: "Negative correlation" }
        ];

        let questions = JSON.parse(JSON.stringify(originalQuestionsData));
        let currentIndex = 0;
        let score = 0;
        let answeredState = new Array(questions.length).fill(false);

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadQuestion() {
            const currentQ = questions[currentIndex];
            const isAnswered = answeredState[currentIndex];
            
            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = currentQ.q;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            let displayOptions = [...currentQ.options];
            if (!isAnswered && document.getElementById('shuffleOptionsToggle').checked) {
                shuffleArray(displayOptions);
            } else if (isAnswered) {
                displayOptions = currentQ.displayedOptions || [...currentQ.options];
            }
            
            currentQ.displayedOptions = displayOptions;

            displayOptions.forEach(optionText => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.textContent = optionText;
                
                if (isAnswered) {
                    optDiv.classList.add('disabled');
                    if (optionText === currentQ.correct) {
                        optDiv.classList.add('correct');
                    } else if (optionText === currentQ.userAnswer && currentQ.userAnswer !== currentQ.correct) {
                        optDiv.classList.add('incorrect');
                    }
                } else {
                    optDiv.onclick = () => handleAnswer(optDiv, optionText);
                }
                
                optionsContainer.appendChild(optDiv);
            });
        }

        function handleAnswer(element, selectedAnswer) {
            if (answeredState[currentIndex]) return;
            
            const currentQ = questions[currentIndex];
            currentQ.userAnswer = selectedAnswer;
            answeredState[currentIndex] = true;

            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.add('disabled'));

            if (selectedAnswer === currentQ.correct) {
                element.classList.add('correct');
                score++;
                document.getElementById('scoreDisplay').textContent = score;
            } else {
                element.classList.add('incorrect');
                allOptions.forEach(opt => {
                    if (opt.textContent === currentQ.correct) {
                        opt.classList.add('correct');
                    }
                });
            }
        }

        function navigate(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= questions.length) currentIndex = questions.length - 1;
            loadQuestion();
        }

        function jumpToQuestion() {
            const input = document.getElementById('jumpInput');
            const val = parseInt(input.value);
            if (!isNaN(val) && val >= 1 && val <= questions.length) {
                currentIndex = val - 1;
                loadQuestion();
                input.value = '';
            } else {
                alert(`Please enter a valid number between 1 and ${questions.length}`);
            }
        }

        function shuffleQuestions() {
            if(confirm("This will restart the reviewer and wipe your current score. Continue?")) {
                shuffleArray(questions);
                resetStates();
            }
        }

        function resetQuiz() {
            if(confirm("This will reset the quiz back to the original order. Continue?")) {
                questions = JSON.parse(JSON.stringify(originalQuestionsData));
                resetStates();
            }
        }

        function resetStates() {
            currentIndex = 0;
            score = 0;
            answeredState = new Array(questions.length).fill(false);
            document.getElementById('scoreDisplay').textContent = score;
            loadQuestion();
        }

        document.getElementById('jumpInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') jumpToQuestion();
        });

        loadQuestion();
    </script>
</body>
</html>
