<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCI Concepts Complete Reviewer (F1-2)</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --correct-bg: #dcfce7;
            --correct-border: #22c55e;
            --correct-text: #166534;
            --incorrect-bg: #fee2e2;
            --incorrect-border: #ef4444;
            --incorrect-text: #991b1b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .reviewer-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--text);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .question-number {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .score-display {
            font-weight: 600;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-wrap;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background-color: var(--bg);
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            background-color: #e5e7eb;
        }

        .option.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option.incorrect {
            background-color: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            color: var(--incorrect-text);
            font-weight: 600;
        }

        .option.disabled {
            cursor: default;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid var(--bg);
            padding-top: 20px;
        }

        .nav-btn {
            padding: 10px 24px;
            font-size: 1rem;
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="reviewer-container">
        <h1>HCI Concepts Complete Reviewer (F1-2)</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="jumpInput">Jump to:</label>
                <input type="number" id="jumpInput" min="1" max="96" placeholder="1-96">
                <button onclick="jumpToQuestion()">Go</button>
            </div>
            <button onclick="shuffleQuestions()">Shuffle Questions</button>
            <label class="toggle-switch">
                <input type="checkbox" id="shuffleOptionsToggle" checked>
                Shuffle Choices Automatically
            </label>
            <button onclick="resetQuiz()">Reset Reviewer</button>
        </div>

        <div class="question-header">
            <div class="question-number" id="questionCounter">Question 1 of 96</div>
            <div class="score-display">Score: <span id="scoreDisplay">0</span></div>
        </div>

        <div class="question-text" id="questionText">Loading...</div>
        
        <div class="options-container" id="optionsContainer">
            </div>

        <div class="navigation">
            <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next</button>
        </div>
    </div>

    <script>
        const originalQuestionsData = [
            { q: "What does HCI stand for?", options: ["Hybrid Computing Interface", "Human Cognitive Interface", "Human-Computer Interaction", "Human-Centered Innovation"], correct: "Human-Computer Interaction" },
            { q: "Who is the author of The Design of Everyday Things?", options: ["Steve Krug", "Ben Shneiderman", "Jakob Nielsen", "Don Norman"], correct: "Don Norman" },
            { q: "What is the focus of industrial designers?", options: ["Emotional impact", "Interface layout", "Form and material", "Usability"], correct: "Form and material" },
            { q: "Which type of designer focuses on usability and understandability?", options: ["Experience designer", "Graphic designer", "Industrial designer", "Interaction designer"], correct: "Interaction designer" },
            { q: "What are \"signifiers\" used for?", options: ["To store user data", "To indicate where actions take place", "To decorate the interface", "To reduce memory load"], correct: "To indicate where actions take place" },
            { q: "What does Ben Shneiderman's rule \"Strive for Consistency\" mean?", options: ["Change layout frequently", "Use consistent design patterns", "Avoid user feedback", "Use random colors"], correct: "Use consistent design patterns" },
            { q: "Which rule helps expert users perform tasks faster?", options: ["Add constraints", "Offer shortcuts", "Reduce memory load", "Use signifiers"], correct: "Offer shortcuts" },
            { q: "What does \"Design Dialog to Yield Closure\" mean?", options: ["Avoid user interaction", "Use pop-ups", "Keep users guessing", "Provide clear task completion feedback"], correct: "Provide clear task completion feedback" },
            { q: "What is the purpose of error handling in UI design?", options: ["To help users understand and fix issues", "To log errors silently", "To hide system flaws", "To confuse users"], correct: "To help users understand and fix issues" },
            { q: "What does \"Permit Easy Reversal of Actions\" refer to?", options: ["Disabling undo", "Allowing users to go back or undo actions", "Locking user input", "Encrypting user data"], correct: "Allowing users to go back or undo actions" },
            { q: "A usability expert is reviewing an interface without knowing the tasks users will perform. What type of testing is this?", options: ["User-based testing", "Summative testing", "Validation testing", "Expert-based testing"], correct: "Expert-based testing" },
            { q: "A researcher collects data on how long users take to complete tasks. What metric is being measured?", options: ["Task performance", "Clickstream", "Time performance", "User satisfaction"], correct: "Time performance" },
            { q: "A team uses software to scan their interface for font consistency and button sizes. What testing method is this?", options: ["Expert-based", "Automated usability testing", "Summative testing", "Formative testing"], correct: "Automated usability testing" },
            { q: "A company wants to test a new smartwatch interface. What should they focus on?", options: ["Network speed", "Physical interaction usability", "Screen resolution", "Battery life"], correct: "Physical interaction usability" },
            { q: "A usability test is conducted using a high-fidelity prototype. What type of testing is this?", options: ["Summative", "Formative", "Expert-based", "Automated"], correct: "Summative" },
            { q: "A team wants to understand where users struggle in the interface. What method should they use?", options: ["Usability testing", "Experimental design", "Survey analysis", "Ethnographic observation"], correct: "Usability testing" },
            { q: "A usability test is conducted in a fixed lab. What is a potential benefit?", options: ["Remote access", "Controlled environment", "Real-time feedback", "Natural user behavior"], correct: "Controlled environment" },
            { q: "A usability test is conducted with wireframes. What type of prototype is this?", options: ["Functional", "Low-fidelity", "Final version", "High-fidelity"], correct: "Low-fidelity" },
            { q: "A usability test is conducted with a moderator asking questions during the session. What type of testing is this?", options: ["Formative", "Validation", "Summative", "Automated"], correct: "Formative" },
            { q: "A usability test is conducted with users performing tasks in a workplace setting. What is this called?", options: ["Field usability testing", "In-lab testing", "Remote testing", "Expert-based testing"], correct: "Field usability testing" },
            { q: "What principle emphasizes placing users at the center of the design process?", options: ["Visual Design", "Cognitive Design", "Human-Centered Design", "Interface Mapping"], correct: "Human-Centered Design" },
            { q: "Which of the following is NOT part of Norman's HCD process?", options: ["Monetize", "Iterate", "Define", "Observe"], correct: "Monetize" },
            { q: "What are \"affordances\" in design?", options: ["Error messages", "Indicators of how a product should be used", "Visual aesthetics", "Cost-saving features"], correct: "Indicators of how a product should be used" },
            { q: "What does \"feedback\" in interaction design refer to?", options: ["User complaints", "Error logs", "System responses to user actions", "Marketing surveys"], correct: "System responses to user actions" },
            { q: "Which of the following is a tangible user interface example?", options: ["Smartphone", "Laptop", "Reactable", "Smartwatch"], correct: "Reactable" },
            { q: "A company is testing a new mobile app with users who accidentally trigger features while scrolling. What type of testing is most appropriate?", options: ["Usability testing on mobile devices", "Expert-based testing", "Automated testing", "Beta testing"], correct: "Usability testing on mobile devices" },
            { q: "A team wants to evaluate a paper prototype of a new dashboard. Which type of testing should they use?", options: ["Summative testing", "Validation testing", "Automated testing", "Formative testing"], correct: "Formative testing" },
            { q: "A team wants to test a new interface with users from different regions. What method is best?", options: ["In-lab testing", "Validation testing", "Expert review", "Remote usability testing"], correct: "Remote usability testing" },
            { q: "A company uses usability testing to evaluate a new feature before release. What is this called?", options: ["Summative testing", "Validation testing", "Formative testing", "Beta testing"], correct: "Summative testing" },
            { q: "A usability test is conducted with users performing tasks without guidance. What is this approach?", options: ["Task-driven usability testing", "Controlled testing", "Expert review", "Naturalistic observation"], correct: "Task-driven usability testing" },
            { q: "A team wants to know how many users can complete a task within 1 minute. What type of test is this?", options: ["Expert-based", "Formative", "Validation", "Summative"], correct: "Validation" },
            { q: "What does \"discoverability\" refer to in interaction design?", options: ["How users feel about a product", "How fast a product loads", "How secure a system is", "How users find possible actions"], correct: "How users find possible actions" },
            { q: "What is a \"conceptual model\"?", options: ["A visual layout", "A database schema", "A user's mental understanding of how a system works", "A wireframe"], correct: "A user's mental understanding of how a system works" },
            { q: "What should feedback be according to Shneiderman?", options: ["Immediate and informative", "Delayed and vague", "Hidden and encrypted", "Optional and minimal"], correct: "Immediate and informative" },
            { q: "What does \"Reduce Short-Term Memory Load\" aim to do?", options: ["Increase cognitive effort", "Make users memorize steps", "Add more features", "Simplify recognition over recall"], correct: "Simplify recognition over recall" },
            { q: "A company uses a validated survey to measure user satisfaction. What metric is this?", options: ["Task performance", "Interface efficiency", "User satisfaction", "Time performance"], correct: "User satisfaction" },
            { q: "A company wants to test a new interface with real users before launch. What is this called?", options: ["Usability testing", "Beta testing", "Automated inspection", "Expert review"], correct: "Usability testing" },
            { q: "What is the role of \"constraints\" in design?", options: ["To increase complexity", "To limit user access", "To reduce feedback", "To challenge the design process"], correct: "To challenge the design process" },
            { q: "A participant completes all tasks correctly but takes longer than expected. What should be analyzed?", options: ["Task abandonment", "User satisfaction", "Interface layout", "Time performance"], correct: "Time performance" },
            { q: "A usability test reveals users often miss a key button. What should be adjusted?", options: ["Button label", "Button color", "Button placement", "All of the above"], correct: "All of the above" },
            { q: "A usability test is conducted in users' homes via video call. What kind of testing is this?", options: ["Automated inspection", "In-lab testing", "Remote usability testing", "Expert review"], correct: "Remote usability testing" },
            { q: "A user struggles with a feature and the moderator asks probing questions. What type of testing is this?", options: ["Validation", "Automated", "Formative", "Summative"], correct: "Formative" },
            { q: "A usability test is conducted over the web with screen recording. What is a major drawback?", options: ["High cost", "Slow data collection", "Limited participant pool", "Inability to observe nonverbal cues"], correct: "Inability to observe nonverbal cues" },
            { q: "During a usability test, a participant struggles with a task and the moderator intervenes. What protocol is this aligned with?", options: ["Open-ended observation", "Ethnographic immersion", "Strict intervention protocol", "Task abandonment"], correct: "Strict intervention protocol" },
            { q: "A company wants to compare their new interface against industry benchmarks before launch. What testing type applies?", options: ["Exploratory", "Validation", "Summative", "Formative"], correct: "Validation" },
            { q: "A moderator avoids helping users unless they are stuck. What principle is being followed?", options: ["Passive observation", "Full immersion", "Controlled intervention", "Open-ended feedback"], correct: "Controlled intervention" },
            { q: "A usability test is conducted using screen mock-ups. What type of prototype is this?", options: ["Low-fidelity", "Functional prototype", "Final version", "High-fidelity"], correct: "Low-fidelity" },
            { q: "A usability test is conducted with only 5 participants. Why is this acceptable?", options: ["Usability testing requires large samples", "It's a survey-based test", "Small samples are sufficient to find major flaws", "It's a pilot study"], correct: "Small samples are sufficient to find major flaws" },
            { q: "A user completes a task incorrectly but quickly. What metric is affected?", options: ["Task performance", "Time performance", "Interface clarity", "User satisfaction"], correct: "Task performance" },
            { q: "What is the primary goal of usability testing?", options: ["To replace traditional research methods", "To improve interface quality by identifying flaws", "To create new interfaces", "To generalize findings to other systems"], correct: "To improve interface quality by identifying flaws" },
            { q: "Usability testing is most closely related to which traditional research methods?", options: ["Experimental design and ethnography", "Meta-analysis and content analysis", "Case studies and surveys", "Historical analysis and interviews"], correct: "Experimental design and ethnography" },
            { q: "Which device type often requires usability testing due to multitouch and small screen size?", options: ["Mobile devices", "Desktop computers", "Printers", "Smart TVs"], correct: "Mobile devices" },
            { q: "What is the main purpose of expert-based usability testing?", options: ["To simulate user behavior", "To test code functionality", "To gather user satisfaction data", "To have interface experts inspect the design"], correct: "To have interface experts inspect the design" },
            { q: "What is a key characteristic of formative testing?", options: ["It requires benchmark comparisons", "It uses automated tools", "It evaluates final designs", "It is exploratory and informal"], correct: "It is exploratory and informal" },
            { q: "What is the purpose of validation testing?", options: ["To explore early design ideas", "To test paper prototypes", "To compare an interface to benchmarks", "To gather qualitative feedback"], correct: "To compare an interface to benchmarks" },
            { q: "What is measured by time performance?", options: ["Number of clicks", "Time spent on incorrect tasks", "Number of errors", "Time to complete tasks successfully"], correct: "Time to complete tasks successfully" },
            { q: "What is a common tool for measuring user satisfaction?", options: ["Survey", "Stopwatch", "Heatmap", "Code analyzer"], correct: "Survey" },
            { q: "Which type of usability testing uses software to evaluate interfaces?", options: ["Expert-based", "Formative", "Summative", "Automated"], correct: "Automated" },
            { q: "What is the main difference between formative and summative testing?", options: ["Formative is for final designs", "Summative uses paper prototypes", "Formative explores early concepts; summative evaluates design choices", "Summative is more informal"], correct: "Formative explores early concepts; summative evaluates design choices" },
            { q: "A smart mirror displays weather and news updates. What type of interface is this?", options: ["Tangible UI", "GUI", "Voice UI", "Augmented Reality"], correct: "GUI" },
            { q: "A user feels overwhelmed by too many options on a screen. What principle is violated?", options: ["Closure", "Affordance", "Feedback", "Reduce Memory Load"], correct: "Reduce Memory Load" },
            { q: "A user interface allows users to undo, redo, and go back easily. Which principle is applied?", options: ["Feedback", "Closure", "Mapping", "Reversal of Actions"], correct: "Reversal of Actions" },
            { q: "A user can complete a task using keyboard shortcuts. Which rule is followed?", options: ["Mapping", "Enable Shortcuts", "Reduce Memory Load", "Feedback"], correct: "Enable Shortcuts" },
            { q: "A user interface uses familiar icons and layout. What principle is applied?", options: ["Closure", "Feedback", "Recognition over Recall", "Affordance"], correct: "Recognition over Recall" },
            { q: "A user receives a message: \"Upload complete.\" What principle is this?", options: ["Mapping", "Closure", "Feedback", "Constraint"], correct: "Closure" },
            { q: "A user interface uses the same color for clickable and non-clickable items. What's wrong?", options: ["Feedback", "Signifier", "Affordance", "Mapping"], correct: "Signifier" },
            { q: "A user interface shows a progress bar during file upload What principle is applied?", options: ["Mapping", "Affordance", "Feedback", "Closure"], correct: "Feedback" },
            { q: "A user interface uses consistent icons across screens. What rule is followed?", options: ["Consistency", "Mapping", "Affordance", "Feedback"], correct: "Consistency" },
            { q: "A user interface uses a calendar picker for date input. What principle is applied?", options: ["Feedback", "Closure", "Constraint", "Mapping"], correct: "Constraint" },
            { q: "What is the \"Wizard of Oz\" technique?", options: ["A test where users interact with a human pretending to be the system", "A remote usability test", "A method for automating usability tests", "A type of expert review"], correct: "A test where users interact with a human pretending to be the system" },
            { q: "Which of the following is a benefit of remote usability testing?", options: ["Better for qualitative data", "Greater participant access", "Easy to observe nonverbal cues", "Allows for probing questions"], correct: "Greater participant access" },
            { q: "What is a task list used for in usability testing?", options: ["To measure screen resolution", "To evaluate code quality", "To guide users through goal-directed tasks", "To record user feedback"], correct: "To guide users through goal-directed tasks" },
            { q: "What does task performance measure?", options: ["Interface loading speed", "Time taken to complete tasks", "User satisfaction", "Number of tasks completed correctly"], correct: "Number of tasks completed correctly" },
            { q: "A microwave has a button labeled \"Start\" but no indication of what it does. What is missing?", options: ["Signifier", "Mapping", "Feedback", "Constraint"], correct: "Signifier" },
            { q: "A banking app uses different colors and layouts for each screen. What rule is being broken?", options: ["Enable Shortcuts", "Offer Error Handling", "Strive for Consistency", "Support Locus of Control"], correct: "Strive for Consistency" },
            { q: "A user expects a slider to adjust volume but it changes brightness. What's wrong?", options: ["Mapping", "Feedback", "Affordance", "Signifier"], correct: "Mapping" },
            { q: "A user sees a red border around a required field. What is this an example of?", options: ["Mapping", "Constraint", "Feedback", "Signifier"], correct: "Signifier" },
            { q: "A user can preview changes before applying them. What principle is applied?", options: ["Closure", "Mapping", "Feedback", "Reversal of Actions"], correct: "Reversal of Actions" },
            { q: "A user presses a button and nothing happens. What is missing?", options: ["Feedback", "Constraint", "Signifier", "Mapping"], correct: "Feedback" },
            { q: "A user clicks \"Submit\" and sees a confirmation message. What principle is applied?", options: ["Closure", "Mapping", "Feedback", "Affordance"], correct: "Closure" },
            { q: "A user interface shows a tooltip when hovering over a button. What is this?", options: ["Signifier", "Feedback", "Constraint", "Mapping"], correct: "Signifier" },
            { q: "What is a key difference between classical research and usability testing?", options: ["Usability testing uses more participants", "Classical research focuses on fixing interface flaws", "Usability testing does not aim for generalization", "Classical research is informal"], correct: "Usability testing does not aim for generalization" },
            { q: "When is summative usability testing typically conducted?", options: ["Before any design work", "After interface release", "With high-fidelity prototypes", "During brainstorming"], correct: "With high-fidelity prototypes" },
            { q: "According to Rubin and Chisnell, what is the first step in usability testing?", options: ["Conduct test sessions", "Analyze data", "Develop the test plan", "Select users"], correct: "Develop the test plan" },
            { q: "A user interface prevents invalid inputs with dropdowns. What principle is used?", options: ["Mapping", "Feedback", "Constraint", "Affordance"], correct: "Constraint" },
            { q: "Which of the following is NOT a type of usability testing mentioned?", options: ["Wizard of Oz", "Beta testing", "Paper prototype", "Code debugging"], correct: "Code debugging" },
            { q: "What is a key limitation of expert-based testing?", options: ["Experts cannot use prototypes", "Experts are biased", "Experts are unfamiliar with interface tasks", "Experts are too expensive"], correct: "Experts are unfamiliar with interface tasks" },
            { q: "A user accidentally deletes a file and cannot undo the action. Which principle was violated?", options: ["Feedback", "Closure", "Consistency", "Reversal of Actions"], correct: "Reversal of Actions" },
            { q: "A user receives a vague error message: \"Something went wrong.\" What should be improved?", options: ["Affordance", "Mapping", "Error Handling", "Feedback"], correct: "Error Handling" },
            { q: "A user interface prevents submission until all fields are filled What principle is used?", options: ["Closure", "Affordance", "Constraint", "Feedback"], correct: "Constraint" },
            { q: "A user is forced to watch a tutorial before using the app. What principle is violated?", options: ["Mapping", "Affordance", "Internal Locus of Control", "Feedback"], correct: "Internal Locus of Control" },
            { q: "A user is confused by a button labeled \"Execute.\" What's missing?", options: ["Signifier", "Mapping", "Constraint", "Feedback"], correct: "Signifier" },
            { q: "What is a drawback of remote usability testing?", options: ["Inability to collect clickstream data", "Difficulty in providing real-time help", "High cost", "Limited participant pool"], correct: "Difficulty in providing real-time help" },
            { q: "A user struggles to find the \"Save\" button in a mobile app. What principle is lacking?", options: ["Affordance", "Discoverability", "Feedback", "Constraint"], correct: "Discoverability" },
            { q: "A user interface uses icons without labels. What might be missing?", options: ["Feedback", "Signifiers", "Closure", "Constraints"], correct: "Signifiers" },
            { q: "A user interface uses a trash icon for deleting files. What principle is this?", options: ["Mapping", "Signifier", "Feedback", "Affordance"], correct: "Affordance" }
        ];

        let questions = JSON.parse(JSON.stringify(originalQuestionsData));
        let currentIndex = 0;
        let score = 0;
        let answeredState = new Array(questions.length).fill(false);

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadQuestion() {
            const currentQ = questions[currentIndex];
            const isAnswered = answeredState[currentIndex];
            
            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = currentQ.q;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            let displayOptions = [...currentQ.options];
            if (!isAnswered && document.getElementById('shuffleOptionsToggle').checked) {
                shuffleArray(displayOptions);
            } else if (isAnswered) {
                displayOptions = currentQ.displayedOptions || [...currentQ.options];
            }
            
            currentQ.displayedOptions = displayOptions;

            displayOptions.forEach(optionText => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.textContent = optionText;
                
                if (isAnswered) {
                    optDiv.classList.add('disabled');
                    if (optionText === currentQ.correct) {
                        optDiv.classList.add('correct');
                    } else if (optionText === currentQ.userAnswer && currentQ.userAnswer !== currentQ.correct) {
                        optDiv.classList.add('incorrect');
                    }
                } else {
                    optDiv.onclick = () => handleAnswer(optDiv, optionText);
                }
                
                optionsContainer.appendChild(optDiv);
            });
        }

        function handleAnswer(element, selectedAnswer) {
            if (answeredState[currentIndex]) return;
            
            const currentQ = questions[currentIndex];
            currentQ.userAnswer = selectedAnswer;
            answeredState[currentIndex] = true;

            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.add('disabled'));

            if (selectedAnswer === currentQ.correct) {
                element.classList.add('correct');
                score++;
                document.getElementById('scoreDisplay').textContent = score;
            } else {
                element.classList.add('incorrect');
                allOptions.forEach(opt => {
                    if (opt.textContent === currentQ.correct) {
                        opt.classList.add('correct');
                    }
                });
            }
        }

        function navigate(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= questions.length) currentIndex = questions.length - 1;
            loadQuestion();
        }

        function jumpToQuestion() {
            const input = document.getElementById('jumpInput');
            const val = parseInt(input.value);
            if (!isNaN(val) && val >= 1 && val <= questions.length) {
                currentIndex = val - 1;
                loadQuestion();
                input.value = '';
            } else {
                alert(`Please enter a valid number between 1 and ${questions.length}`);
            }
        }

        function shuffleQuestions() {
            if(confirm("This will restart the reviewer and wipe your current score. Continue?")) {
                shuffleArray(questions);
                resetStates();
            }
        }

        function resetQuiz() {
            if(confirm("This will reset the quiz back to the original order. Continue?")) {
                questions = JSON.parse(JSON.stringify(originalQuestionsData));
                resetStates();
            }
        }

        function resetStates() {
            currentIndex = 0;
            score = 0;
            answeredState = new Array(questions.length).fill(false);
            document.getElementById('scoreDisplay').textContent = score;
            loadQuestion();
        }

        document.getElementById('jumpInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') jumpToQuestion();
        });

        loadQuestion();
    </script>
</body>
</html>
