        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        h2 { margin: 0; font-size: 1.2rem; }

        .btn {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .option:hover:not(.disabled) { background-color: var(--hover); }
        
        /* New Styles for Immediate Feedback */
        .option.correct {
            border-color: var(--primary);
            background-color: rgba(76, 175, 80, 0.15);
        }

        .option.incorrect {
            border-color: var(--danger);
            background-color: rgba(244, 67, 54, 0.15);
        }
        
        .option.disabled {
            cursor: default;
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            min-height: 24px;
        }
        .feedback.correct { color: var(--primary); }
        .feedback.incorrect { color: var(--danger); }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .hidden { display: none; }
        
        #results { text-align: center; }
        .score { font-size: 2.5rem; color: var(--primary); margin: 20px 0; }
        .score-subtext { margin-bottom: 25px; color: #aaa; }
    </style>

        // State variables
        let currentQuestionIndex = 0;
        let activeQuestions = [...quizData];
        
        // Trackers for immediate feedback and scoring
        let firstAttempts = new Array(activeQuestions.length).fill(null); // Tracks if 1st guess was right/wrong for scoring
        let lockedQuestions = new Array(activeQuestions.length).fill(false); // True if they eventually got it right
        let wrongGuesses = Array.from({ length: activeQuestions.length }, () => []); // Remembers which wrong answers they clicked

        // DOM Elements
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressText = document.getElementById('progress-text');
        const feedbackMsg = document.getElementById('feedback-message');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const restartBtn = document.getElementById('restart-btn');
        const quizScreen = document.getElementById('quiz-screen');
        const resultsScreen = document.getElementById('results-screen');
        const scoreDisplay = document.getElementById('score-display');

        function loadQuestion() {
            const currentQ = activeQuestions[currentQuestionIndex];
            questionText.textContent = currentQ.question;
            progressText.textContent = `Question ${currentQuestionIndex + 1} of ${activeQuestions.length}`;
            
            // Clear previous options and feedback
            optionsContainer.innerHTML = '';
            feedbackMsg.textContent = '';
            feedbackMsg.className = 'feedback';

            // Restore feedback text if navigating back to an already answered question
            if (lockedQuestions[currentQuestionIndex]) {
                feedbackMsg.textContent = 'Correct!';
                feedbackMsg.className = 'feedback correct';
            } else if (wrongGuesses[currentQuestionIndex].length > 0) {
                feedbackMsg.textContent = 'Incorrect, try again!';
                feedbackMsg.className = 'feedback incorrect';
            }

            // Generate options
            currentQ.options.forEach(option => {
                const optionEl = document.createElement('div');
                optionEl.classList.add('option');
                optionEl.textContent = option;
                
                // Re-apply states if the user navigated backward
                if (lockedQuestions[currentQuestionIndex]) {
                    if (option === currentQ.answer) optionEl.classList.add('correct');
                    optionEl.classList.add('disabled');
                } else if (wrongGuesses[currentQuestionIndex].includes(option)) {
                    optionEl.classList.add('incorrect');
                }

                optionEl.onclick = () => selectOption(option, optionEl);
                optionsContainer.appendChild(optionEl);
            });

            // Update navigation button states
            prevBtn.disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === activeQuestions.length - 1) {
                nextBtn.textContent = 'Finish';
                nextBtn.style.backgroundColor = '#FF9800'; 
            } else {
                nextBtn.textContent = 'Next';
                nextBtn.style.backgroundColor = 'var(--primary)';
            }
        }

        // Handle option selection
        function selectOption(selectedOption, element) {
            // Do nothing if question is already answered correctly
            if (lockedQuestions[currentQuestionIndex]) return;

            const currentQ = activeQuestions[currentQuestionIndex];

            // Record first attempt for final score
            if (firstAttempts[currentQuestionIndex] === null) {
                firstAttempts[currentQuestionIndex] = (selectedOption === currentQ.answer);
            }

            if (selectedOption === currentQ.answer) {
                // Correct Answer Logic
                element.classList.remove('incorrect');
                element.classList.add('correct');
                feedbackMsg.textContent = 'Correct!';
                feedbackMsg.className = 'feedback correct';
                lockedQuestions[currentQuestionIndex] = true;
                
                // Disable all options
                const allOptions = document.querySelectorAll('.option');
                allOptions.forEach(opt => opt.classList.add('disabled'));
            } else {
                // Incorrect Answer Logic
                if (!wrongGuesses[currentQuestionIndex].includes(selectedOption)) {
                    wrongGuesses[currentQuestionIndex].push(selectedOption);
                }
                element.classList.add('incorrect');
                feedbackMsg.textContent = 'Incorrect, try again!';
                feedbackMsg.className = 'feedback incorrect';
            }
        }

        function resetGameState() {
            firstAttempts = new Array(activeQuestions.length).fill(null);
            lockedQuestions = new Array(activeQuestions.length).fill(false);
            wrongGuesses = Array.from({ length: activeQuestions.length }, () => []);
            currentQuestionIndex = 0;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < activeQuestions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        });

        shuffleBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to shuffle? This will reset your current progress.")) {
                shuffleArray(activeQuestions);
                resetGameState();
                loadQuestion();
            }
        });

        restartBtn.addEventListener('click', () => {
            resetGameState();
            quizScreen.classList.remove('hidden');
            resultsScreen.classList.add('hidden');
            loadQuestion();
        });

        function showResults() {
            let score = 0;
            
            // Calculate score based on FIRST attempts only
            for (let i = 0; i < activeQuestions.length; i++) {
                if (firstAttempts[i] === true) {
                    score++;
                }
            }

            quizScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');
            
            const percentage = (score / activeQuestions.length) * 100;
            scoreDisplay.textContent = `${score} / ${activeQuestions.length}`;
            
            if(percentage >= 80) {
                scoreDisplay.style.color = '#4CAF50'; 
            } else if (percentage >= 60) {
                scoreDisplay.style.color = '#FFC107'; 
            } else {
                scoreDisplay.style.color = '#F44336'; 
            }
        }

        // Start app
        loadQuestion();
    </script>
