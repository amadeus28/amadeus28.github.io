        :root {

            --text-light: #6b7280;
            --correct-bg: #dcfce7;
            --correct-border: #22c55e;

        }

        body {

            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .reviewer-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--text);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .question-number {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .score-display {
            font-weight: 600;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-wrap;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background-color: var(--bg);
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            background-color: #e5e7eb;
        }

        .option.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option.incorrect {
            background-color: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            color: var(--incorrect-text);
            font-weight: 600;
        }

        .option.disabled {
            cursor: default;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid var(--bg);
            padding-top: 20px;
        }

        .nav-btn {
            padding: 10px 24px;
            font-size: 1rem;
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            cursor: pointer;
        }
    </style>
</head>

            { q: "Class Diagrams it show the object classes in the system and the associations between system component.", options: ["True", "False"], correct: "False" },
            { q: "Modeling user interaction this is not important as it helps to identify user requirements.", options: ["True", "False"], correct: "False" },
            { q: "It show the interactions between a system and its environment.", options: ["Case diagrams", "Activity diagrams", "Sequence diagrams"], correct: "Sequence diagrams" },
            { q: "It shows how the software is decomposed for development.", options: ["development view", "logical view", "physical view"], correct: "development view" },
            { q: "What is Architectural Patterns?", options: ["Used to model the interfacing of sub-systems.", "Distributed system model which shows how data and processing is distributed across a range of components.", "is a stylized description of good design practice, which has been tried and tested in different environments."], correct: "is a stylized description of good design practice, which has been tried and tested in different environments." },
            { q: "Information systems have a generic architecture that cannot be organised as a layered architecture.", options: ["True", "False"], correct: "False" },
            { q: "Process view which shows how, at walk-time, the system is composed of interacting processes.", options: ["True", "False"], correct: "False" },
            { q: "Means that analysis of whether the system can meet its non-functional requirements is possible.", options: ["Stakeholder communication", "Large-scale reuse", "System analysis"], correct: "System analysis" },
            { q: "Process models these reveal how the system being developed is used in broader business processes.", options: ["True", "False"], correct: "True" },
            { q: "These are transaction-based systems as interaction with these systems generally not involves database transactions.", options: ["True", "False"], correct: "False" },
            { q: "A syntax analyzer, which checks the syntax of the language not translated.", options: ["True", "False"], correct: "False" },
            { q: "It shows the system hardware and how software components are distributed across the processors in the system.", options: ["logical view", "process view", "physical view"], correct: "physical view" },
            { q: "Language processing systems applications where system actions depend on interpreting events from the system's environment.", options: ["True", "False"], correct: "False" },
            { q: "Information and resource management systems are now usually web-based systems where the user interfaces are implemented using a web browser.", options: ["True", "False"], correct: "True" },
            { q: "A syntax tree, which is an external structure representing the program being compiled.", options: ["True", "False"], correct: "False" },
            { q: "A code generator that 'runs' the syntax tree and generates abstract machine code.", options: ["True", "False"], correct: "False" },
            { q: "Large-scale reuse the architecture may be reusable across a range of systems.", options: ["True", "False"], correct: "True" },
            { q: "A model the context or environment of the system.", options: ["interaction perspective", "structural perspective", "external perspective"], correct: "external perspective" },
            { q: "Case diagrams which not shows the interactions between a system and its environment.", options: ["True", "False"], correct: "False" },
            { q: "What is Architectural Design?", options: ["The design process for identifying the sub-systems making up a system and the framework for sub-system control and communication", "An early stage of the system design process.", "is concerned with the way that an individual program is decomposed into components."], correct: "The design process for identifying the sub-systems making up a system and the framework for sub-system control and communication" },
            { q: "That process data in batches without explicit user intervention during the processing.", options: ["Data processing applications", "Transaction processing applications", "Event processing systems"], correct: "Data processing applications" },
            { q: "Event processing systems applications where system actions depend on interpreting events from the system's environment.", options: ["True", "False"], correct: "True" },
            { q: "Use a layered architecture with critical assets in the inner layers.", options: ["Safety", "Performance", "Security"], correct: "Security" },
            { q: "Case diagrams which shows the interactions between a system and its environment.", options: ["True", "False"], correct: "True" },
            { q: "Use fine-grain, replaceable components.", options: ["Availability", "Safety", "Maintainability"], correct: "Maintainability" },
            { q: "Structural perspective where you model the organization of a system or the structure of the data that is not processed by the system.", options: ["True", "False"], correct: "False" },
            { q: "Include redundant components and mechanisms for fault tolerance.", options: ["Availability", "Safety", "Maintainability"], correct: "Availability" },
            { q: "State diagrams it shows how the system reacts to internal and external events.", options: ["True", "False"], correct: "True" },
            { q: "Small-scale reuse the architecture may be reusable across a range of systems.", options: ["True", "False"], correct: "False" },
            { q: "These are established to define what is inside and what is outside the system.", options: ["Process perspective", "System boundaries", "Interaction models"], correct: "System boundaries" },
            { q: "It shows how, at run-time, the system is composed of interacting processes.", options: ["logical view", "physical view", "process view"], correct: "process view" },
            { q: "Structural perspective where you model the organization of a system or the structure of the data that is processed by the system.", options: ["True", "False"], correct: "True" },
            { q: "Interaction perspective model where you model the interactions between a system and its environment, or between the components of a system.", options: ["True", "False"], correct: "True" },
            { q: "Class Diagrams it show the object classes in the system and the associations between these classes.", options: ["True", "False"], correct: "True" },
            { q: "The web server is responsible for all user communications, with the user interface implemented using a web browser.", options: ["True", "False"], correct: "True" },
            { q: "System modeling is not the process of developing abstract models of a system, with each model presenting a different view or perspective of that system.", options: ["True", "False"], correct: "False" }
        ];

        let questions = JSON.parse(JSON.stringify(originalQuestionsData));
        let currentIndex = 0;
        let score = 0;
        let answeredState = new Array(questions.length).fill(false);

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadQuestion() {
            const currentQ = questions[currentIndex];
            const isAnswered = answeredState[currentIndex];
            
            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = currentQ.q;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            let displayOptions = [...currentQ.options];
            if (!isAnswered && document.getElementById('shuffleOptionsToggle').checked) {
                shuffleArray(displayOptions);
            } else if (isAnswered) {
                displayOptions = currentQ.displayedOptions || [...currentQ.options];
            }
            
            currentQ.displayedOptions = displayOptions;

            displayOptions.forEach(optionText => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.textContent = optionText;
                
                if (isAnswered) {
                    optDiv.classList.add('disabled');
                    if (optionText === currentQ.correct) {
                        optDiv.classList.add('correct');
                    } else if (optionText === currentQ.userAnswer && currentQ.userAnswer !== currentQ.correct) {
                        optDiv.classList.add('incorrect');
                    }
                } else {
                    optDiv.onclick = () => handleAnswer(optDiv, optionText);
                }
                
                optionsContainer.appendChild(optDiv);
            });
        }

        function handleAnswer(element, selectedAnswer) {
            if (answeredState[currentIndex]) return;
            
            const currentQ = questions[currentIndex];
            currentQ.userAnswer = selectedAnswer;
            answeredState[currentIndex] = true;

            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.add('disabled'));

            if (selectedAnswer === currentQ.correct) {
                element.classList.add('correct');
                score++;
                document.getElementById('scoreDisplay').textContent = score;
            } else {
                element.classList.add('incorrect');
                allOptions.forEach(opt => {
                    if (opt.textContent === currentQ.correct) {
                        opt.classList.add('correct');
                    }
                });
            }
        }

        function navigate(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= questions.length) currentIndex = questions.length - 1;
            loadQuestion();
        }

        function jumpToQuestion() {
            const input = document.getElementById('jumpInput');
            const val = parseInt(input.value);
            if (!isNaN(val) && val >= 1 && val <= questions.length) {
                currentIndex = val - 1;
                loadQuestion();
                input.value = '';
            } else {
                alert(`Please enter a valid number between 1 and ${questions.length}`);
            }
        }

        function shuffleQuestions() {
            if(confirm("This will restart the reviewer and wipe your current score. Continue?")) {
                shuffleArray(questions);
                resetStates();
            }
        }

        function resetQuiz() {
            if(confirm("This will reset the quiz back to the original order. Continue?")) {
                questions = JSON.parse(JSON.stringify(originalQuestionsData));
                resetStates();
            }
        }

        function resetStates() {
            currentIndex = 0;
            score = 0;
            answeredState = new Array(questions.length).fill(false);
            document.getElementById('scoreDisplay').textContent = score;
            loadQuestion();
        }

        document.getElementById('jumpInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') jumpToQuestion();
        });

        loadQuestion();
    </script>
