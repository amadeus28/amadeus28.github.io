<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMI Certification Complete Reviewer</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --correct-bg: #dcfce7;
            --correct-border: #22c55e;
            --correct-text: #166534;
            --incorrect-bg: #fee2e2;
            --incorrect-border: #ef4444;
            --incorrect-text: #991b1b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .reviewer-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--text);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .question-number {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .score-display {
            font-weight: 600;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-wrap;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background-color: var(--bg);
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            background-color: #e5e7eb;
        }

        .option.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option.incorrect {
            background-color: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            color: var(--incorrect-text);
            font-weight: 600;
        }

        .option.disabled {
            cursor: default;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid var(--bg);
            padding-top: 20px;
        }

        .nav-btn {
            padding: 10px 24px;
            font-size: 1rem;
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch input {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="reviewer-container">
        <h1>PMI Certification Complete Reviewer</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="jumpInput">Jump to:</label>
                <input type="number" id="jumpInput" min="1" max="86" placeholder="1-86">
                <button onclick="jumpToQuestion()">Go</button>
            </div>
            <button onclick="shuffleQuestions()">Shuffle Questions</button>
            <label class="toggle-switch">
                <input type="checkbox" id="shuffleOptionsToggle" checked>
                Shuffle Choices
            </label>
            <button onclick="resetQuiz()">Reset Reviewer</button>
        </div>

        <div class="question-header">
            <div class="question-number" id="questionCounter">Question 1 of 86</div>
            <div class="score-display">Score: <span id="scoreDisplay">0</span></div>
        </div>

        <div class="question-text" id="questionText">Loading...</div>
        
        <div class="options-container" id="optionsContainer">
            </div>

        <div class="navigation">
            <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next</button>
        </div>
    </div>

    <script>
        const originalQuestionsData = [
            { q: "1. What is a deliverable?", options: ["A unique output of a project", "A resource allocated to the project", "A checkpoint in the project timeline", "A team member working on a project"], correct: "A unique output of a project" },
            { q: "2. Your customer states that the packaging for the new product being developed must be easy for everyone to open. During product testing, only 60% of the people were able to open the packaging easily. As the project manager, what should you do?", options: ["Request a team meeting to decide on corrective action.", "Inform the project sponsor that the project has failed.", "Meet with the product testers to change the results.", "Inform the customer that more than 50% is an acceptable result"], correct: "Request a team meeting to decide on corrective action." },
            { q: "3. What is a project life cycle?", options: ["The series of phases that a project passes through from its start to its completion", "The sequence of activities that determines the shortest possible duration of a project", "The tasks performed to deliver a product, service, or result with specified features and functions", "The steps used to identify the best possible solution to a problem"], correct: "The series of phases that a project passes through from its start to its completion" },
            { q: "4. What is a benefit of creating a lessons learned document?", options: ["Sharing best practice approaches among the team members", "Creating marketing materials that can be used to promote the product", "Meeting with the client to provide closure to the project", "Ensuring team members are held responsible for their mistakes"], correct: "Sharing best practice approaches among the team members" },
            { q: "5. What is a key characteristic of the adaptive project management approach?", options: ["Continuous refinement of the product based upon stakeholder feedback", "Minimal changes due to familiarity with project requirements", "Sequential completion of tasks with no change in scope", "Delivery of the product after the final phase has been completed"], correct: "Continuous refinement of the product based upon stakeholder feedback" },
            { q: "6. You are part of a project team that is working on developing a new app. A team member suggests that you add a feature to the app. The project manager says that the feature is out of scope. What should you do if a product feature is out of scope?", options: ["You should decline the development of the feature.", "You should develop the feature as part of the project.", "You should consider the feature a project dependency.", "You should add the feature to the scope statement."], correct: "You should decline the development of the feature." },
            { q: "7. What role does quality assurance play in the project development process?", options: ["It ensures procedures are followed to meet standards for performance.", "It ensures the project is delivered within budget.", "It ensures employees are qualified to complete their assigned tasks.", "It ensures the project is delivered on time."], correct: "It ensures procedures are followed to meet standards for performance." },
            { q: "8. Which scenario demonstrates a schedule dependency?", options: ["Team members must wait to start a task until after another task is completed.", "Team members must schedule activities during business hours.", "Team members must work independently on tasks.", "Team members must determine the minimum time necessary to complete a project."], correct: "Team members must wait to start a task until after another task is completed." },
            { q: "9. Move each element of a project charter from the list on the left to its description on the right and check pdf (Just Next)", options: ["Next", "N/A", "N/A", "N/A"], correct: "Next" },
            { q: "10. You are an event coordinator for an upcoming party. The customer changes the party date. You know that this change will result in an increase in the cost of the venue. What should you do to resolve the budget variance?", options: ["Determine the cost difference and discuss options with the customer.", "Cancel the venue contract and then find a new venue.", "Stay at the same venue and tell the caterers to remove menu items to save money.", "Approve the date change and invoice the customer for more money."], correct: "Determine the cost difference and discuss options with the customer." },
            { q: "11. Which action signifies the formal acceptance of the final product?", options: ["Approval by the project sponsor and customer", "Closing of vendor contracts by the project team", "Final budget approval by the project manager", "Completion of all paperwork by the project manager"], correct: "Approval by the project sponsor and customer" },
            { q: "12. You are the project manager for a small construction project. You receive an updated quote from one of the material suppliers and the cost has increased by $2000. You request a meeting with your project sponsor to discuss what to do next. Which stage of the change management process are you beginning?", options: ["Assess the change impact", "Identify the change", "Approve the change", "Implement the approved change"], correct: "Assess the change impact" },
            { q: "13. Recent feedback from a client requires adjusting the scope of a project as well as some additional funding. Who needs to provide the approval to move forward with the changes?", options: ["Project sponsor", "Business analyst", "Project manager", "Resource manager"], correct: "Project sponsor" },
            { q: "14. You need to select a project management approach for your team. Key considerations include: The team has worked on similar projects, The deliverable must comply with standards and regulations, The project tasks are well-defined, and The project deliverable is clearly defined. What project management approach should you choose?", options: ["Predictive", "Scrum", "Adaptive", "Incremental"], correct: "Predictive" },
            { q: "15. Which project document authorizes the project manager to begin working on a project?", options: ["Project charter", "Project management plan", "Project scope statement", "Project communication plan"], correct: "Project charter" },
            { q: "16. You are one of the team members planning a small community event. The project manager assigns you the task of planning for the event at a specific location. You find a better location and want to alert your team to the change in location. What responsibility and authority do you have regarding your assigned task?", options: ["You need to speak with the project manager about changing the location and wait for approval.", "You can change the location without approval and set up for the community event.", "You cannot approve the location change until all team members have voted on the decision.", "You need to inform the sponsor directly about the change and then move the event to the new location."], correct: "You need to speak with the project manager about changing the location and wait for approval." },
            { q: "17. What impact does gold plating have on a project?", options: ["The scope increases and the cost to the customer increases.", "The scope increases and the cost to the customer remains the same.", "The scope remains the same and the cost to the customer decreases.", "The scope remains the same and the cost to the customer increases."], correct: "The scope increases and the cost to the customer increases." },
            { q: "18. You are evaluating the skills needed in your project team to successfully complete a project. Which component of the project management plan are you working on?", options: ["Resource management plan", "Cost management plan", "Scope management plan", "Schedule management plan"], correct: "Resource management plan" },
            { q: "19. Which component of the project management plan outlines the work needed to meet project objectives and deliverables?", options: ["Scope management plan", "Cost management plan", "Resource management plan", "Schedule management plan"], correct: "Scope management plan" },
            { q: "20. Which project characteristic suggests that a predictive project management approach should be used?", options: ["Defined deliverables and deadlines", "High levels of change and risk", "Evolving goals and requirements", "Multiple releases of product features"], correct: "Defined deliverables and deadlines" },
            { q: "21. What is project procurement?", options: ["The purchasing of external goods and services needed to complete a project", "The analysis of the business requirements needed to complete a project", "The identification of all the funding requirements needed to complete a project", "The planning of all communication methods needed to complete a project"], correct: "The purchasing of external goods and services needed to complete a project" },
            { q: "22. In a project, what describes work that should be included and work that should be excluded?", options: ["Scope statement", "Project baseline", "Business case", "Work breakdown structure (WBS)"], correct: "Scope statement" },
            { q: "23. You are estimating the cost of a project by using the budget from a similar project last month. Which type of budget estimation technique are you using?", options: ["Analogous/historical estimation", "Expert judgment estimation", "Three-point estimation", "Bottom-up estimation"], correct: "Analogous/historical estimation" },
            { q: "24. Why should you archive project documents and processes?", options: ["To keep a historical record of project activities", "To complete the project management plan", "To store all project documents on the project manager's personal computer", "To redistribute remaining resources to other projects"], correct: "To keep a historical record of project activities" },
            { q: "25. You are estimating the cost of a project by using the budget from a similar project last month. Which type of budget estimation technique are you using?", options: ["Analogous/historical estimation", "Expert judgment estimation", "Three-point estimation", "Bottom-up estimation"], correct: "Analogous/historical estimation" },
            { q: "26. You are managing a project that is experiencing significant scope creep. What is the impact on the project?", options: ["The project will take additional time to complete.", "The project will require fewer resources to develop.", "The project will be assigned a new project manager.", "The project will include fewer deliverables."], correct: "The project will take additional time to complete." },
            { q: "27. Predictive and adaptive project management approaches have different key characteristics. For each key characteristic, select Predictive or Adaptive. Check PDF (Just Next)", options: ["Next", "N/A", "N/A", "N/A"], correct: "Next" },
            { q: "28. What is a vendor?", options: ["An external supplier who provides goods or services to a project", "A business analyst who works with the finance team for a project", "A procurement team member who negotiates contracts for a project", "An experienced business professional who can sell the final product"], correct: "An external supplier who provides goods or services to a project" },
            { q: "29. As a project manager, what information do you need to include in a status update to your boss?", options: ["Project work that has been completed", "A list of project stakeholders", "Project goals and objectives", "A description of the project scope"], correct: "Project work that has been completed" },
            { q: "30. Your project team is using an agile project delivery method. In preparation for an upcoming meeting, your manager asks you to review the prioritized list of deliverables. What should you review?", options: ["Backlog", "Kanban board", "User story", "Work breakdown structure (WBS)"], correct: "Backlog" },
            { q: "31. As a project manager, how should you encourage your team to be focused, energized, and positive for the duration of a project?", options: ["Discover what personally motivates each team member.", "Report poor behavior to upper management.", "Give each team member the authority to change project deadlines.", "Rank team members' performance during team meetings."], correct: "Discover what personally motivates each team member." },
            { q: "32. What is the primary goal of creating a work breakdown structure (WBS)?", options: ["To decompose the project work into assignable work activities", "To prepare an organizational chart for the project team members", "To describe the key stakeholders and their roles in the project", "To determine which team members will be responsible for each project activity"], correct: "To decompose the project work into assignable work activities" },
            { q: "33. Who is responsible for overseeing the daily activities of a project from start to finish?", options: ["Project manager", "Client", "Vendor", "Sponsor"], correct: "Project manager" },
            { q: "34. A project team is arguing about the start date for an important task in the project. The project sponsor intervenes and sets the start date. Which type of conflict resolution technique is the project sponsor using?", options: ["Forcing", "Avoiding", "Smoothing", "Collaborating"], correct: "Forcing" },
            { q: "35. You are one of the event planners for a large town festival. You are reviewing a list of potential bakeries that will supply the desserts at the festival. When you review the list, you notice that your favorite aunt owns one of the bakeries, but no one else on your team knows this information. According to project management ethical guidelines, what should you do?", options: ["Notify your supervisor that your aunt's bakery is on the list.", "Tell your aunt to lower her prices so that she can be easily selected for the event.", "Inform your aunt that she will need to remove her bakery from the selection list.", "Proceed with the selection process, confident that you will act fairly."], correct: "Notify your supervisor that your aunt's bakery is on the list." },
            { q: "36. What is the purpose of following a change management process?", options: ["To document a change in scope and any impact to the project", "To delay a new feature request so the customer will reconsider any changes", "To inform the customer that your team takes their suggested product changes seriously", "To show the project sponsor that you follow correct procedures"], correct: "To document a change in scope and any impact to the project" },
            { q: "37. As a project manager, which activity should you perform when using a predictive project management approach?", options: ["Create a detailed project plan that includes all of the project activities.", "Begin the current sprint before planning for the next one.", "View the backlog to determine the next planning activity required.", "Review deliverables after each iteration with the customer"], correct: "Create a detailed project plan that includes all of the project activities." },
            { q: "38. A community center director hires your project team to build a playground for the families in the community. Upon completion of the playground, who is responsible for the final acceptance of the project?", options: ["The director (your client)", "The project team", "The families in the community", "The project manager (you)"], correct: "The director (your client)" },
            { q: "39. You have contracted an external supplier to provide a tool needed for the development phase in a project. The tool has been delivered and the project team finds the tool acceptable and they are using it. Why should you now close the contract with the supplier?", options: ["To request that the supplier be paid for the delivery of the tool", "To inform the procurement team that the new tool has been delivered", "To prevent the supplier from contacting team members for payment", "To thank the supplier for delivering the tool according to the contract"], correct: "To request that the supplier be paid for the delivery of the tool" },
            { q: "40. Your manager explains that the project team starts every new project with a design stage where they create a design, test the design, make updates to the design, retest, and then create a final design. After this design stage, they create and follow a detailed project plan for all the remaining project deliverables. Which project management approach are they using?", options: ["Hybrid", "Predictive", "Scrum", "Adaptive"], correct: "Hybrid" },
            { q: "41. You have received a request to add a new scope item to your project and need to follow the change management process. What is the correct order of actions?", options: ["Identify the change, Assess the change impact, Approve or deny the change, Implement the approved change", "Assess the change impact, Identify the change, Implement the approved change, Approve or deny the change", "Approve or deny the change, Identify the change, Assess the change impact, Implement the approved change", "Identify the change, Approve or deny the change, Assess the change impact, Implement the approved change"], correct: "Identify the change, Assess the change impact, Approve or deny the change, Implement the approved change" },
            { q: "42. You are the project manager on an interior design project. The floor tiles in the original project plan are no longer available. Who has the authority to choose a new style for the replacement tiles?", options: ["The customer", "The project team", "The business analyst", "The project manager"], correct: "The customer" },
            { q: "43. How does an adaptive project management approach engage customers?", options: ["It encourages customers to provide continuous feedback.", "It encourages customers to contribute to the lessons learned process.", "It encourages customers to complete sections of the project management plan.", "It encourages customers to complete tasks on the project backlog."], correct: "It encourages customers to provide continuous feedback." },
            { q: "44. Why is quality assurance included in the project development process?", options: ["To ensure products meet specifications and requirements", "To evaluate the performance of new employees", "To motivate project team members to complete project milestones on time", "To verify that project expenses remain under baseline budgets"], correct: "To ensure products meet specifications and requirements" },
            { q: "45. You need to select a project management approach for an upcoming project. Key considerations include: You are working with new technologies and processes. The scope of the project is unclear. The client wants to be informed and involved in all phases of the project. You have a highly qualified and motivated team. The project requires a significant amount of testing and retesting. Which project management approach should you choose?", options: ["Adaptive", "Predictive", "Hybrid", "Critical path"], correct: "Adaptive" },
            { q: "46. While working on your current project, the team learned a new, creative approach to managing project resources. What is a benefit of reporting this new approach in the lessons learned documentation?", options: ["To inform other teams of the new approach", "To inform the legal team of the new approach", "To inform competitors of the new approach", "To inform the client of the new approach"], correct: "To inform other teams of the new approach" },
            { q: "47. What is a vendor?", options: ["An external supplier who provides goods or services to a project", "A procurement team member who negotiates contracts for a project", "An experienced business professional who can sell the final product", "A business analyst who works with the finance team for a project"], correct: "An external supplier who provides goods or services to a project" },
            { q: "48. At a team meeting, your project sponsor states the customer is concerned that the software being developed will not perform reliably. As the project manager, how should you respond?", options: ["Meet with the customer to understand the basis of their concerns.", "Ask the engineering team to increase software reliability.", "Email the customer to inform them reliability will be addressed at the end of the project.", "Inform the project sponsor that the customer is using old performance data."], correct: "Meet with the customer to understand the basis of their concerns." },
            { q: "49. In a project, who has the highest level of authority to make project decisions such as changes to the project scope, schedule, or budget?", options: ["The sponsor", "The business analyst", "The quality assurance manager", "The project manager"], correct: "The sponsor" },
            { q: "50. You are creating a budget for your project by calculating the accurate cost of each activity in the project. Which method of budget development are you using?", options: ["Bottom-up", "Three-point estimate", "Analogous/historical comparison", "Top-down"], correct: "Bottom-up" },
            { q: "51. During a project, your team develops new procedures to create certain product features more efficiently. Why should the team archive the project documents and new procedures?", options: ["To provide reference material for teams working on similar projects", "To show the sponsor the efficiency of the team", "To identify the employees that discovered the new procedures", "To receive recognition for developing new procedures"], correct: "To provide reference material for teams working on similar projects" },
            { q: "52. What describes a project's requirements, including major deliverables and exclusions of the project?", options: ["Scope statement", "Status report", "Work breakdown structure", "Business case"], correct: "Scope statement" },
            { q: "53. You are managing a project that is experiencing significant scope creep. What is the impact on the project?", options: ["The project will take additional time to complete.", "The project will require fewer resources to develop.", "The project will be assigned a new project manager.", "The project will include fewer deliverables."], correct: "The project will take additional time to complete." },
            { q: "54. You are a team member working on a project. All the team members signed a non-disclosure agreement (NDA) and promised not to share information with other people outside of the project team. You witness a team member talking about the project to someone outside the project. According to project management ethical guidelines, what should you do?", options: ["Bring the situation to the attention of the project manager.", "Send an email to all employees with the definition of non-disclosure.", "Let the project manager discover and take care of the issue.", "Remind the team about the importance of keeping project details confidential."], correct: "Bring the situation to the attention of the project manager." },
            { q: "55. Which action signifies the formal acceptance of the final product?", options: ["Approval by the project sponsor and customer", "Closing of vendor contracts by the project team", "Final budget approval by the project manager", "Completion of all paperwork by the project manager"], correct: "Approval by the project sponsor and customer" },
            { q: "56. You are part of a project team that is working on developing a new app. A team member suggests that you add a feature to the app. They says that the feature is out of scope. What should you do if a product feature is out of scope?", options: ["You should decline the development of the feature.", "You should develop the feature as part of the project.", "You should add the feature to the scope statement.", "You should consider the feature a project dependency."], correct: "You should decline the development of the feature." },
            { q: "57. Which document is issued by the project sponsors to formally authorize the existence of a project and is the starting point for initial project planning?", options: ["Project charter", "Procurement contract", "Scope statement", "Project management plan"], correct: "Project charter" },
            { q: "58. What is a dependency?", options: ["A relationship between two or more tasks", "The difference between the estimated and the actual length of a task", "An accidental change in project requirements", "The work needed to complete the project"], correct: "A relationship between two or more tasks" },
            { q: "59. You are an event planner for an upcoming wedding. In your meetings with the couple, they often disagree about colors and styles for the wedding decorations. When you try to get involved, it tends to make the disagreement worse so you decide to give them time to talk about their choices. Eventually the couple agrees on a joint decision. Which conflict resolution technique are you using?", options: ["Withdrawal", "Collaborating", "Compromising", "Forcing"], correct: "Withdrawal" },
            { q: "60. You are a project team member working on a community festival. Your project manager assigns you the task of creating a map of all the games, rides, and vendors at the festival. You want to take another team member off their assigned task to help you, which will save you half the time. What responsibility and authority do you have regarding your assigned task?", options: ["You need to get approval from the project manager before asking for help.", "You need to promise your team member that you will help them after they help you.", "You can reassign tasks as long as both tasks are completed on time.", "You can use your team member's help as long as you complete your assigned task faster."], correct: "You need to get approval from the project manager before asking for help." },
            { q: "61. You are an event coordinator and meet with the customer to review the current status of the project. When reviewing the event invitations, your customer requests a change in the design work. Which stage of the change management process does this represent?", options: ["Identify the change", "Implement the approved change", "Assess the change impact", "Approve the change"], correct: "Identify the change" },
            { q: "62. What is a deliverable?", options: ["A result created as an outcome of a project", "A task that leads to a larger outcome", "An organized list of activities", "A set of resources needed to accomplish an activity"], correct: "A result created as an outcome of a project" },
            { q: "63. Which project characteristic suggests that a predictive project management approach should be used?", options: ["Defined deliverables and deadlines", "Multiple releases of product features", "High levels of change and risk", "Evolving goals and requirements"], correct: "Defined deliverables and deadlines" },
            { q: "64. A project team is having difficulty meeting deadlines and focusing on the tasks that need to be completed. After meeting with each team member, the project manager decides to offer a paid bonus to three of them, extra time off to two of them, and the ability to work remotely to the remaining two members if they complete the project on time. Why did the project manager decide to provide the team members with different perks?", options: ["The project manager discovered how to motivate each team member individually.", "The project manager wanted to reward the team with something fun.", "The project manager had additional budget that needed to be spent.", "The project manager hoped that random perks would inspire the team to work harder."], correct: "The project manager discovered how to motivate each team member individually." },
            { q: "65. What impact does gold plating have on a project?", options: ["The scope increases and the cost to the customer increases.", "The scope increases and the cost to the customer remains the same.", "The scope remains the same and the cost to the customer decreases.", "The scope remains the same and the cost to the customer increases."], correct: "The scope increases and the cost to the customer increases." },
            { q: "66.  Predictive and adaptive project management approaches have different key characteristics. For each project description, select Adaptive or Predictive Check PDF (Just Next)", options: ["Next", "N/A", "N/A", "N/A"], correct: "Next" },
            { q: "67. What is a purpose of including a schedule in the project management plan?", options: ["To communicate project deliverable deadlines", "To obtain management support for the project", "To evaluate the work performance of the team", "To assign team members to different activities"], correct: "To communicate project deliverable deadlines" },
            { q: "68. Who is responsible for completing project deliverables?", options: ["Team members", "Sponsors", "Product managers", "Business analysts"], correct: "Team members" },
            { q: "69. What is project procurement?", options: ["The purchasing of external goods and services needed to complete a project", "The planning of all communication methods needed to complete a project", "The identification of all the funding requirements needed to complete a project", "The analysis of the business requirements needed to complete a project"], correct: "The purchasing of external goods and services needed to complete a project" },
            { q: "70. What should you include in the project purpose section of the project charter?", options: ["A description of the business need", "An outline of the key points in time in the project", "A list of key milestones", "A statement describing the expected deliverables"], correct: "A description of the business need" },
            { q: "71. You provide the following information to your boss: Work planned vs. work completed, Budget planned vs. budget spent, Issues or roadblocks. Which type of communication are you providing?", options: ["A status update", "A contingency plan", "A business plan", "A project charter"], correct: "A status update" },
            { q: "72. Which statement describes the main purpose of using a change management process?", options: ["To document all modifications and formalize their approval", "To list project scope requirements and create an initial scope baseline", "To discuss new requirements and have customers add them to the work breakdown structure (WBS)", "To identify new stakeholders and add them to the stakeholder register"], correct: "To document all modifications and formalize their approval" },
            { q: "73. You are the project manager for an upcoming bicycle race. You discover that road construction nearby may interfere with the path of the race. Which part of the project management plan should you update?", options: ["Risk", "Schedule", "Cost", "Resource"], correct: "Risk" },
            { q: "74. Which statement describes a characteristic of a predictive project management approach?", options: ["Planning is completed for the entire scope of the project at the beginning.", "Planning is completed for deliverables needed in the next two weeks.", "Planning is completed in short increments as part of a cycle.", "Planning is completed annually as part of a company finance cycle."], correct: "Planning is completed for the entire scope of the project at the beginning." },
            { q: "75. Why is contract closure an important element of project closing?", options: ["It ensures that the work described in the contract was completed as specified", "It ensures that workers can no longer access project materials.", "It ensures that the project management plan is updated with contract completion status.", "It ensures that the project budget has enough money to cover the expenses."], correct: "It ensures that the work described in the contract was completed as specified" },
            { q: "76. Move all the project life cycle phases to the answer area and place them in the correct order.", options: ["1. Initiating the project, 2. Organizing and preparing, 3. Carrying out the work, 4. Ending the project", "1. Organizing and preparing, 2. Initiating the project, 3. Carrying out the work, 4. Ending the project", "1. Initiating the project, 2. Carrying out the work, 3. Organizing and preparing, 4. Ending the project", "1. Carrying out the work, 2. Initiating the project, 3. Organizing and preparing, 4. Ending the project"], correct: "1. Initiating the project, 2. Organizing and preparing, 3. Carrying out the work, 4. Ending the project" },
            { q: "77. A project consists of the development of a new product that contains software and hardware components.", options: ["The software will be developed using sprints.", "N/A", "N/A", "N/A"], correct: "The software will be developed using sprints." },
            { q: "78. The hardware prototype will be developed according to product specifications in the project management plan with minimal customer feedback. Which type of project management approach does this scenario describe?", options: ["Hybrid", "Incremental", "Adaptive", "Predictive"], correct: "Hybrid" },
            { q: "79. You are a project coordinator working to build a new house. You are meeting with the customer to review progress when they notice that the kitchen cabinets that were installed do not match the kitchen cabinets that they selected as part of the scope. What should you do to resolve the scope variance?", options: ["Discuss options with the customer to correct the issue and gain their approval on the course of action.", "Contact the cabinet maker to order the right cabinets, regardless of the impact on the schedule and cost.", "Require the customer to accept the house as-is and give them a discount on the house price.", "Communicate with the customer that the project will be over budget with any additional changes and their house price will increase."], correct: "Discuss options with the customer to correct the issue and gain their approval on the course of action." },
            { q: "80. You are managing a house painting project. Move each change management process step from the list on the left to the scenario that describes iton the right. Change Management Process Steps Check PDF (not in order) ", options: ["Next", "N/A", "N/A", "N/A"], correct: "Next" },
            { q: "81. Why is contract closure an important element of project closing?", options: ["It ensures that the work described in the contract was completed as specified", "It ensures that the project budget has enough money to cover the expenses.", "It ensures that workers can no longer access project materials", "It ensures that the project management plan is updated with contract completion status"], correct: "It ensures that the work described in the contract was completed as specified" },
            { q: "82. What is the purpose of a work breakdown structure (WBS)?", options: ["To identify all the activities needed to complete a project", "To identify all the stakeholders impacted by a project", "To identify all the communication methods needed for a project", "To identify all the roles and responsibilities in a project"], correct: "To identify all the activities needed to complete a project" },
            { q: "83. Move all the project life cycle phases to the answer area and place them in the current order.", options: ["1. Initiating the project, 2. Organizing and preparing, 3. Carrying out the work, 4. Ending the project", "1. Organizing and preparing, 2. Initiating the project, 3. Carrying out the work, 4. Ending the project", "1. Initiating the project, 2. Carrying out the work, 3. Organizing and preparing, 4. Ending the project", "1. Carrying out the work, 2. Initiating the project, 3. Organizing and preparing, 4. Ending the project"], correct: "1. Initiating the project, 2. Organizing and preparing, 3. Carrying out the work, 4. Ending the project" },
            { q: "84. Which project characteristic suggests that a predictive project management approach should be used?", options: ["Defined deliverables and deadlines", "High levels of change and risk", "Evolving goals and requirements", "Multiple releases of product features"], correct: "Defined deliverables and deadlines" },
            { q: "85. In a project, who has the highest level of authority to make project decisions such as changes to the project scope, schedule, or budget?", options: ["The sponsor", "The project manager", "The business analyst", "The quality assurance manager"], correct: "The sponsor" },
            { q: "86. In an adaptive project management approach; which statement describes the actions of team members?", options: ["They work on the highest priority items in the product backlog.", "They work through all the tasks sequentially to complete the final product.", "They gather all customer requirements at the beginning of the project.", "They take turns leading the project so they can each gain experience in leadership."], correct: "They work on the highest priority items in the product backlog." },
            { q: "87. Which document is issued by the project sponsors to formally authorize the existence of a project and is the starting point for initial project planning?", options: ["Project charter", "Procurement contract", "Project management plan", "Scope statement"], correct: "Project charter" }
        ];

        let questions = JSON.parse(JSON.stringify(originalQuestionsData));
        let currentIndex = 0;
        let score = 0;
        let answeredState = new Array(questions.length).fill(false);

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadQuestion() {
            const currentQ = questions[currentIndex];
            const isAnswered = answeredState[currentIndex];
            
            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = currentQ.q;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            let displayOptions = [...currentQ.options];
            if (!isAnswered && document.getElementById('shuffleOptionsToggle').checked) {
                shuffleArray(displayOptions);
            } else if (isAnswered) {
                displayOptions = currentQ.displayedOptions || [...currentQ.options];
            }
            
            currentQ.displayedOptions = displayOptions;

            displayOptions.forEach(optionText => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.textContent = optionText;
                
                if (isAnswered) {
                    optDiv.classList.add('disabled');
                    if (optionText === currentQ.correct) {
                        optDiv.classList.add('correct');
                    } else if (optionText === currentQ.userAnswer && currentQ.userAnswer !== currentQ.correct) {
                        optDiv.classList.add('incorrect');
                    }
                } else {
                    optDiv.onclick = () => handleAnswer(optDiv, optionText);
                }
                
                optionsContainer.appendChild(optDiv);
            });
        }

        function handleAnswer(element, selectedAnswer) {
            if (answeredState[currentIndex]) return;
            
            const currentQ = questions[currentIndex];
            currentQ.userAnswer = selectedAnswer;
            answeredState[currentIndex] = true;

            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.add('disabled'));

            if (selectedAnswer === currentQ.correct) {
                element.classList.add('correct');
                score++;
                document.getElementById('scoreDisplay').textContent = score;
            } else {
                element.classList.add('incorrect');
                allOptions.forEach(opt => {
                    if (opt.textContent === currentQ.correct) {
                        opt.classList.add('correct');
                    }
                });
            }
        }

        function navigate(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= questions.length) currentIndex = questions.length - 1;
            loadQuestion();
        }

        function jumpToQuestion() {
            const input = document.getElementById('jumpInput');
            const val = parseInt(input.value);
            if (!isNaN(val) && val >= 1 && val <= questions.length) {
                currentIndex = val - 1;
                loadQuestion();
                input.value = '';
            } else {
                alert(`Please enter a valid number between 1 and ${questions.length}`);
            }
        }

        function shuffleQuestions() {
            if(confirm("This will restart the reviewer and wipe your current score. Continue?")) {
                shuffleArray(questions);
                resetStates();
            }
        }

        function resetQuiz() {
            if(confirm("This will reset the quiz back to the original order. Continue?")) {
                questions = JSON.parse(JSON.stringify(originalQuestionsData));
                resetStates();
            }
        }

        function resetStates() {
            currentIndex = 0;
            score = 0;
            answeredState = new Array(questions.length).fill(false);
            document.getElementById('scoreDisplay').textContent = score;
            loadQuestion();
        }

        document.getElementById('jumpInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') jumpToQuestion();
        });

        loadQuestion();
    </script>
