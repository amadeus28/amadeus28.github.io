<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Administration Reviewer</title>
    <style>
        :root {
            --primary: #0ea5e9; /* Changed to a nice blue/cyan for this specific subject */
            --primary-hover: #0284c7;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --correct-bg: #dcfce7;
            --correct-border: #22c55e;
            --correct-text: #166534;
            --incorrect-bg: #fee2e2;
            --incorrect-border: #ef4444;
            --incorrect-text: #991b1b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .reviewer-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--text);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            outline: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .question-number {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .score-display {
            font-weight: 600;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-wrap;
            background: #fdfdfd;
            padding: 15px;
            border-left: 4px solid var(--primary);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            background-color: var(--bg);
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option:hover:not(.disabled) {
            background-color: #e5e7eb;
        }

        .option.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option.incorrect {
            background-color: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            color: var(--incorrect-text);
            font-weight: 600;
        }

        .option.disabled {
            cursor: default;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid var(--bg);
            padding-top: 20px;
        }

        .nav-btn {
            padding: 10px 24px;
            font-size: 1rem;
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="reviewer-container">
        <h1>System Administration & Maintenance Reviewer</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="jumpInput">Jump to:</label>
                <input type="number" id="jumpInput" min="1" max="43" placeholder="1-43">
                <button onclick="jumpToQuestion()">Go</button>
            </div>
            <button onclick="shuffleQuestions()">Shuffle Questions</button>
            <button onclick="resetQuiz()">Reset Reviewer</button>
        </div>

        <div class="question-header">
            <div class="question-number" id="questionCounter">Loading...</div>
            <div class="score-display">Score: <span id="scoreDisplay">0</span></div>
        </div>

        <div class="question-text" id="questionText">Loading...</div>
        
        <div class="options-container" id="optionsContainer">
        </div>

        <div class="navigation">
            <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next</button>
        </div>
    </div>

    <script>
const originalQuestionsData = [
            { q: "NFS is a protocol that enables files to be shared over a network", options: ["True", "False"], correct: "True" },
            { q: "SMB is a protocol that Samba implements", options: ["True", "False"], correct: "True" },
            { q: "When considering software licenses, it's important to review the terms and agreement", options: ["True", "False"], correct: "True" },
            { q: "HTTP makes sure the communication on the web browser has with the website, is secured through encryption", options: ["True", "False"], correct: "False" },
            { q: "IMAP downloads email from an email server onto your local device, deletes the email from the email server", options: ["True", "False"], correct: "False" },
            { q: "NAS is a relatively affordable solution for FAT storage hardware", options: ["True", "False"], correct: "True" },
            { q: "When considering software licenses, it's not important to review the terms and agreement", options: ["True", "False"], correct: "False" },
            { q: "Web server stores and serves content to clients through the Internet", options: ["True", "False"], correct: "True" },
            { q: "A company uses a private cloud for the services their own and the rest of the infrastructure, whether on-site or in a remote data center", options: ["True", "False"], correct: "True" },
            { q: "Platform services provide a platform for developers to code, build and manage software applications.", options: ["True", "False"], correct: "True" },
            { q: "FAT32 is a system that's compatible with Windows, Linux, and Mac OSes", options: ["True", "False"], correct: "True" },
            { q: "_____ enable employees in a company to talk to one another", options: ["Communication Services", "Security Services", "Productivity Services", "Interconnectivity Services"], correct: "Communication Services" },
            { q: "User Productivity Services are software development programs, word processing, graphical editors, finance software, etc.", options: ["True", "False"], correct: "True" },
            { q: "______ is used for keeping data encrypted, authentication, etc.", options: ["Security Services", "Communication Services", "User Productivity Services", "Interconnectivity Services"], correct: "Security Services" },
            { q: "SMTP is an email protocol for sending email", options: ["True", "False"], correct: "True" },
            { q: "_____ are software development programs, word processing, graphical editors, finance software, etc.", options: ["Communication Services", "Security Services", "User Productivity Services", "Interconnectivity Services"], correct: "User Productivity Services" },
            { q: "XAMPP is an open-source protocol used in instant messaging applications and social networking services", options: ["True", "False"], correct: "False" },
            { q: "There are three ways to set up email for a company.", options: ["True", "False"], correct: "False" },
            { q: "\"_____\" record is used for hostnames", options: ["A", "B", "C", "D"], correct: "A" },
            { q: "SSL version 3.0 is essentially TLS version 1.0", options: ["True", "False"], correct: "True" },
            { q: "AD is the Microsoft's implementation of LDAP", options: ["TRUE", "FALSE"], correct: "TRUE" },
            { q: "DISP stands for _________", options: ["Directory Information Shadowing Protocol", "Directory Information Service Protocol", "Directory Information System Protocol", "Directory Intelligent Shadowing Protocol"], correct: "Directory Information Shadowing Protocol" },
            { q: "Active Directory is a free and open source service", options: ["TRUE", "FALSE"], correct: "FALSE" },
            { q: "OpenLDAP supports a wide range of platforms like Windows, Unix, Linux and various Unix derivatives", options: ["LDAP", "AD", "ADUC", "OpenLDAP"], correct: "OpenLDAP" },
            { q: "DSP stands for Directory System Protocol", options: ["TRUE", "FALSE"], correct: "TRUE" },
            { q: "ADAC stands for ________", options: ["Active Directory Administrative Center", "Active Directory Administration Center", "Active Directory Administration Centre", "Active Directory Account Centralization"], correct: "Active Directory Administrative Center" },
            { q: "Domain controllers host a replica of the Active Directory database and group policy objects", options: ["TRUE", "FALSE"], correct: "TRUE" },
            { q: "Replication provides redundancy by having multiple servers available simultaneously", options: ["TRUE", "FALSE"], correct: "TRUE" },
            { q: "When using _________, you aren't actually authenticating at all, depending on how it's configured anyone could potentially access that directory", options: ["anonymous binding", "Simple authentication", "SASL", "Complex Authentication"], correct: "anonymous binding" },
            { q: "RBAC stands for replication-based access control", options: ["TRUE", "FALSE"], correct: "FALSE" },
            { q: "Active Directory supports a wide range of platforms like Windows, Unix, Linux and various Unix derivatives", options: ["TRUE", "FALSE"], correct: "FALSE" },
            { q: "Duplication provides redundancy by having multiple servers available simultaneously", options: ["TRUE", "FALSE"], correct: "FALSE" },
            { q: "GLBP is a set of policies and preferences that can be applied to a group of objects in the directory", options: ["TRUE", "FALSE"], correct: "FALSE" },
            { q: "ADAC stands for Active Directory Administration Center", options: ["TRUE", "FALSE"], correct: "FALSE" },
            { q: "Directory services provides centralized authentication, authorization, and accounting", options: ["TRUE", "FALSE"], correct: "TRUE" },
            { q: "AD is an open standards for communication and access for directory services", options: ["TRUE", "FALSE"], correct: "FALSE" },
            { q: "Kerberos is a network authentication protocol that is used to authenticate user identity, secure the transfer of user credentials, and more", options: ["TRUE", "FALSE"], correct: "TRUE" },
            { q: "____ is a set of policies and preferences that can be applied to a group of objects in the directory", options: ["GPO", "GLBP", "GOP", "GBLP"], correct: "GPO" },
            { q: "RBAC stands for role-based access control", options: ["TRUE", "FALSE"], correct: "TRUE" },
            { q: "Security groups can contain user accounts, computer accounts or other security groups", options: ["TRUE", "FALSE"], correct: "TRUE" }
        ];

        let questions = JSON.parse(JSON.stringify(originalQuestionsData));
        let currentIndex = 0;
        let score = 0;
        let answeredState = new Array(questions.length).fill(false);

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadQuestion() {
            const currentQ = questions[currentIndex];
            const isAnswered = answeredState[currentIndex];
            
            document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('questionText').textContent = currentQ.q;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            currentQ.options.forEach(optText => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = optText;
                
                if (isAnswered) {
                    div.classList.add('disabled');
                    if (optText === currentQ.correct) div.classList.add('correct');
                    else if (optText === currentQ.userAnswer) div.classList.add('incorrect');
                } else {
                    div.onclick = () => {
                        currentQ.userAnswer = optText;
                        answeredState[currentIndex] = true;
                        if (optText === currentQ.correct) score++;
                        document.getElementById('scoreDisplay').textContent = score;
                        loadQuestion();
                    };
                }
                container.appendChild(div);
            });
        }

        function navigate(dir) {
            currentIndex += dir;
            loadQuestion();
        }

        function jumpToQuestion() {
            const val = parseInt(document.getElementById('jumpInput').value);
            if (val >= 1 && val <= questions.length) {
                currentIndex = val - 1;
                loadQuestion();
            }
        }

        function shuffleQuestions() {
            shuffleArray(questions);
            currentIndex = 0;
            score = 0;
            answeredState.fill(false);
            document.getElementById('scoreDisplay').textContent = score;
            loadQuestion();
        }

        function resetQuiz() {
            questions = JSON.parse(JSON.stringify(originalQuestionsData));
            currentIndex = 0;
            score = 0;
            answeredState.fill(false);
            document.getElementById('scoreDisplay').textContent = score;
            loadQuestion();
        }

        // Initialize script on load
        document.getElementById('jumpInput').max = originalQuestionsData.length;
        document.getElementById('jumpInput').placeholder = `1-${originalQuestionsData.length}`;
        loadQuestion();
    </script>
</body>
</html>
