<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Spanish Numbers</title>
    <style>
        :root {
            --primary: #4a90e2;
            --background: #f4f7f6;
            --text: #333;
            --correct: #28a745;
            --wrong: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-top: 0;
        }

        .number-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 1rem 0;
            color: var(--text);
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        button {
            background-color: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary);
            color: white;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        button.correct {
            background-color: var(--correct);
            border-color: var(--correct);
            color: white;
        }

        button.wrong {
            background-color: var(--wrong);
            border-color: var(--wrong);
            color: white;
        }

        #feedback {
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5em;
            margin-bottom: 1rem;
        }

        #next-btn {
            background-color: var(--primary);
            color: white;
            width: 100%;
            display: none;
        }

        .score-board {
            margin-top: 1.5rem;
            font-size: 1rem;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Spanish Numbers 1-20</h1>
        
        <div class="number-display" id="number-display">?</div>
        
        <div id="feedback"></div>

        <div class="choices" id="choices">
            </div>

        <button id="next-btn" onclick="generateQuestion()">Next Number ➔</button>

        <div class="score-board" id="score-display">Score: 0 / 0</div>
    </div>

    <script>
        // Dictionary of numbers 1 to 20
        const numberData = [
            { num: 1, es: "uno" }, { num: 2, es: "dos" }, { num: 3, es: "tres" },
            { num: 4, es: "cuatro" }, { num: 5, es: "cinco" }, { num: 6, es: "seis" },
            { num: 7, es: "siete" }, { num: 8, es: "ocho" }, { num: 9, es: "nueve" },
            { num: 10, es: "diez" }, { num: 11, es: "once" }, { num: 12, es: "doce" },
            { num: 13, es: "trece" }, { num: 14, es: "catorce" }, { num: 15, es: "quince" },
            { num: 16, es: "dieciséis" }, { num: 17, es: "diecisiete" }, { num: 18, es: "dieciocho" },
            { num: 19, es: "diecinueve" }, { num: 20, es: "veinte" }
        ];

        let score = 0;
        let totalAsked = 0;

        function generateQuestion() {
            // Pick a random correct number
            const correctObj = numberData[Math.floor(Math.random() * numberData.length)];
            
            // Gather 3 unique wrong options
            let options = [correctObj.es];
            while(options.length < 4) {
                let wrongObj = numberData[Math.floor(Math.random() * numberData.length)];
                if(!options.includes(wrongObj.es)) {
                    options.push(wrongObj.es);
                }
            }

            // Shuffle the options so the correct answer isn't always in the same spot
            options.sort(() => Math.random() - 0.5);

            // Update the user interface
            document.getElementById('number-display').innerText = correctObj.num;
            document.getElementById('feedback').innerText = '';
            document.getElementById('next-btn').style.display = 'none';
            
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = ''; // Clear old buttons

            options.forEach(opt => {
                let btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, correctObj.es, btn);
                choicesDiv.appendChild(btn);
            });
        }

        function checkAnswer(selectedAnswer, correctAnswer, clickedBtn) {
            // Lock all buttons so the user can't click again
            const buttons = document.querySelectorAll('#choices button');
            buttons.forEach(b => b.disabled = true);

            const feedbackElement = document.getElementById('feedback');

            if (selectedAnswer === correctAnswer) {
                clickedBtn.classList.add('correct');
                feedbackElement.innerText = '¡Correcto! (Correct!)';
                feedbackElement.style.color = 'var(--correct)';
                score++;
            } else {
                clickedBtn.classList.add('wrong');
                feedbackElement.innerText = `Oops! The answer is ${correctAnswer}.`;
                feedbackElement.style.color = 'var(--wrong)';
                
                // Show the correct answer
                buttons.forEach(b => {
                    if (b.innerText === correctAnswer) b.classList.add('correct');
                });
            }

            totalAsked++;
            document.getElementById('score-display').innerText = `Score: ${score} / ${totalAsked}`;
            document.getElementById('next-btn').style.display = 'block'; // Show next button
        }

        // Start the first game
        generateQuestion();
    </script>
</body>
</html>
